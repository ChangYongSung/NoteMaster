:root {
  --red:    #c0392b;
  --red2:   #e74c3c;
  --dark:   #1a0a0a;
  --cream:  #fdf6e3;
  --gold:   #f39c12;
  --green:  #27ae60;
  --blue:   #2980b9;
  --shadow: 0 4px 20px rgba(0,0,0,.25);
  --p1-col: #1a6bbf;
  --p2-col: #b81a1a;
  --p1-light: #d6e9ff;
  --p2-light: #ffd6d6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html {
  height: 100%;
}
body {
  font-family:'Jua',sans-serif;
  background: linear-gradient(135deg,#1a0505 0%,#2d0a0a 50%,#1a0505 100%);
  height: 100dvh;
  min-height: -webkit-fill-available;
  color:#fff;
  display:flex; flex-direction:column; align-items:center;
  padding: 0;
  overflow: hidden;
}

/* ══════════ 설정 화면 ══════════ */
#phase-settings {
  background: var(--cream);
  color: #222;
  border-radius: 16px;
  padding: 2vh 2vw;
  box-shadow: var(--shadow);
  width: calc(100% - 16px);
  max-width: min(900px, 98vw);
  margin: 1vh 8px;
  display: flex;
  flex-direction: column;
  gap: 1.2vh;
  overflow-y: auto;
  max-height: calc(100vh - 2vh);
}

h1 {
  font-family:'Jua',sans-serif;
  font-size: clamp(1.89rem, 4.2vw, 3.78rem);
  letter-spacing:.02em;
  color:#c0392b;
  text-align:center;
  margin-bottom: 0.5vh;
}
h1 span { color:#f39c12; }

.setting-row { display:flex; flex-direction:column; gap:6px; }
.setting-label {
  font-size: 1.65rem;
  font-weight:bold; color:#7b2d2d;
  border-left:4px solid var(--red); padding-left:10px;
}
.btn-group-row { display:flex; gap:8px; flex-wrap:wrap; }
.opt-btn {
  font-family:'Jua',sans-serif;
  font-size: 1.18rem;
  padding: 5px 14px; border:2px solid #ccc; border-radius:10px;
  background:#fff; color:#555; cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.opt-btn.active {
  background:var(--gold); color:#fff; border-color:var(--gold);
  box-shadow:0 2px 8px rgba(243,156,18,.4);
}
.opt-btn:hover:not(.active) { border-color:#f39c12; color:#e67e22; }

.opt-btn.disabled-look {
  background:#ddd !important; color:#aaa !important;
  border-color:#ccc !important; cursor:not-allowed !important;
  text-decoration: line-through;
}

/* 설정 행 2열 레이아웃 */
.settings-cols {
  display: flex;
  gap: 2vw;
  flex-wrap: wrap;
}
.settings-col {
  flex: 1;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 1.2vh;
}

.start-btn {
  font-family:'Jua',sans-serif;
  font-size: 2.0rem;
  padding: 18px 0;
  width: 240px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,#c0392b,#e74c3c);
  color:#fff; cursor:pointer; align-self:flex-start; margin-top: 0.5vh;
  box-shadow:0 4px 16px rgba(192,57,43,.5);
  transition:transform .1s, box-shadow .1s;
}
.start-btn:active { transform:scale(.97); }

/* 2인용 모드 안내 배너 */
.mode-notice {
  background: #fff3cd;
  border: 2px solid #f39c12;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: clamp(0.82rem, 1.3vw, 1.05rem);
  color: #856404;
  display: none;
}
.mode-notice.show { display: block; }

/* ══════════ 퀴즈 화면 (1인용) ══════════ */
#phase-quiz {
  display:none;
  flex-direction:column;
  align-items:center;
  gap: 1vh;
  width:100%;
  max-width: min(860px, 98vw);
  flex: 1;
  min-height: 0;
  padding: 1vh 8px;
  overflow: hidden;
}

.quiz-top {
  display:flex; gap:10px; width:100%;
  align-items:stretch;
}

.question-card {
  background:#fdf6e3; border:3px solid #c8b89a; border-radius:14px;
  padding: 1vh 1vw; flex:1;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  min-height: 140px;
}
.q-label {
  font-size: clamp(1rem, 1.8vw, 1.6rem); color:#000; font-weight:bold;
}
.q-num { color:#c0392b; }

.timer-card {
  background:#fff; border:3px solid #ddd; border-radius:14px;
  padding: 8px 12px; flex:0 0 140px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
}
.timer-label { font-size: clamp(1rem, 1.5vw, 1.6rem); color:#888; font-weight:bold; }
#timer-num {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(3.5rem, 6vw, 6rem); color:#1a1a1a; line-height:1;
}
#timer-unit { font-size: clamp(1.2rem, 1.8vw, 1.8rem); color:#555; }

/* 1인용 버튼 영역 */
#answer-buttons {
  width:100%;
  max-width: min(860px, 98vw);
}
.note-btns-wrap {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 16px 0;
}
.note-btn {
  font-family:'Jua',sans-serif;
  font-size: 2.42rem;
  width: 100px;
  height: 100px;
  border:none; border-radius:16px;
  background:linear-gradient(135deg,#c0392b,#e74c3c);
  color:#fff; cursor:pointer;
  box-shadow:0 4px 12px rgba(192,57,43,.4);
  transition:transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  display: flex; align-items: center; justify-content: center;
}
.note-btn:active { transform:scale(.93); box-shadow:0 2px 6px rgba(192,57,43,.3); }
.note-btn:disabled { background:#aaa; box-shadow:none; cursor:default; }

/* 피아노 케이스 */
.piano-case {
  background:linear-gradient(180deg,#8B2A2A 0%,#6B1A1A 40%,#7A2020 70%,#5C1515 100%);
  border-radius:12px; padding:8px 12px 10px;
  box-shadow:0 6px 24px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.1);
  border:2px solid #A03030; width:100%;
  max-width: min(860px, 98vw);
}
.piano-key-area {
  background:#111; border-radius:4px;
  box-shadow:inset 0 3px 8px rgba(0,0,0,.7); overflow:hidden;
  touch-action:pan-x; -webkit-user-select:none; user-select:none;
  padding-bottom:8px;
}
.piano-key-area::-webkit-scrollbar { height:18px; }
.piano-key-area::-webkit-scrollbar-track { background:#222; border-radius:10px; }
.piano-key-area::-webkit-scrollbar-thumb { background:#999; border-radius:10px; border:3px solid #222; min-width:60px; }
.piano-key-area::-webkit-scrollbar-thumb:hover { background:#bbb; }
.piano-key-area { scrollbar-width:auto; scrollbar-color:#999 #222; }
#piano-keyboard { position:relative; display:flex; height:132px; min-width:max-content; }
.key.white {
  width:52px; height:128px; background:#fff;
  border-radius:0 0 5px 5px; z-index:1; touch-action:none;
  border:1px solid #bbb; border-top:none; transition:background .07s;
  position:relative;
}
.key.white.pressed, .key.white:active { background:#ffe0b2; }
.key.white.ref-do { background:#fef08a; }
.key.white.ref-do .key-label { color:#b45309; font-weight:bold; }
.key.black {
  width:32px; height:72px; touch-action:none;
  background:linear-gradient(180deg,#3a3a3a 0%,#111 100%);
  border-radius:0 0 4px 4px; z-index:2;
  border:1px solid #000; border-top:none; transition:background .07s;
  position:absolute;
}
.key.black.pressed, .key.black:active { background:linear-gradient(180deg,#555 0%,#333 100%); }
.key-label {
  font-family:'Jua',sans-serif; font-size:15px; pointer-events:none;
  text-align:center; line-height:1.1;
}
.key.white .key-label { color:#1a237e; position:absolute; bottom:6px; width:100%; }

/* 피드백 오버레이 (1인용) */
#feedback-overlay {
  position:fixed; inset:0;
  display:none; align-items:center; justify-content:center;
  z-index:100; pointer-events:none;
}
#feedback-box {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  padding: 20px 40px;
  border-radius:20px; text-align:center; line-height:1.4;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  animation: popIn .2s ease;
}
#feedback-box.correct { background:#27ae60; color:#fff; }
#feedback-box.wrong   { background:#c0392b; color:#fff; }
@keyframes popIn {
  from { transform:scale(.7); opacity:0; }
  to   { transform:scale(1);  opacity:1; }
}

/* ══════════ 2인 대전 화면 ══════════ */
#phase-duel {
  display: none;
  width: 100%;
  flex: 1;
  min-height: 0;
  max-width: 100vw;
  flex-direction: column;
  align-items: stretch;
  gap: 0;
  overflow: hidden;
}

.duel-header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.4vh 1vw;
  gap: 1vw;
  flex-shrink: 0;
}

.duel-players {
  display: flex;
  flex: 1;
  gap: 6px;
  padding: 0 6px 4px;
  overflow: hidden;
  min-height: 0;
}

.player-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  gap: 0;
  min-width: 0;
}

.player-panel.p1 { --pc: var(--p1-col); --pc-light: var(--p1-light); }
.player-panel.p2 { --pc: var(--p2-col); --pc-light: var(--p2-light); }

.player-header {
  background: var(--pc);
  color: #fff;
  text-align: center;
  padding: 4px 0 0;
  height: 32px;
  line-height: 28px;
  border-radius: 10px 10px 0 0;
  flex-shrink: 0;
}
.player-name {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1rem, 2.5vw, 1.8rem);
  letter-spacing: 0.05em;
}

.score-display {
  background: var(--pc);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5vw;
  padding: 0;
  height: 40px;
  flex-shrink: 0;
}
.score-current {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  color: #fff;
  line-height: 1;
}
.score-total {
  font-size: clamp(1rem, 2vw, 1.5rem);
  color: rgba(255,255,255,0.75);
  align-self: flex-end;
  padding-bottom: 4px;
}

.duel-staff-wrap {
  background: var(--pc-light);
  border: 2px solid var(--pc);
  border-radius: 0;
  padding: 0.5vh 0.5vw;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  justify-content: center;
}
.duel-staff-wrap svg {
  display: block;
  width: 100%;
  max-width: 340px;
  height: auto;
  max-height: 100%;
  flex-shrink: 1;
}
.duel-q-label {
  font-size: clamp(0.8rem, 1.4vw, 1.1rem);
  color: #444;
  font-weight: bold;
}

.duel-btns-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pc-light);
  border: 2px solid var(--pc);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 4px 0.5vw;
  flex-shrink: 0;
}

.duel-note-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  width: 100%;
}

.duel-note-btn {
  font-family: 'Jua', sans-serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  aspect-ratio: auto;
  height: 88px;
  width: 100%;
  border: none;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  transition: transform .1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  padding: 0;
}
.p1 .duel-note-btn {
  background: linear-gradient(135deg, #1565c0, #1a6bbf);
  box-shadow: 0 3px 10px rgba(21,101,192,.4);
}
.p2 .duel-note-btn {
  background: linear-gradient(135deg, #b81a1a, #e53935);
  box-shadow: 0 3px 10px rgba(184,26,26,.4);
}
.duel-note-btn:active { transform: scale(.91); }
.duel-note-btn:disabled { background: #aaa !important; box-shadow: none; cursor: default; }

/* 피드백 (2인 전용, 각 패널 오버레이) */
.duel-feedback {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none;
  border-radius: inherit;
}
.duel-feedback.show { display: flex; }
.duel-feedback-box {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  padding: 16px 30px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 6px 30px rgba(0,0,0,.5);
  animation: popIn .18s ease;
}
.duel-feedback-box.correct { background: #27ae60; color: #fff; }
.duel-feedback-box.wrong   { background: #c0392b; color: #fff; }

/* 각 패널은 position:relative 필요 */
.player-panel-inner {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════ 대전 결과 화면 ══════════ */
#phase-duel-result {
  display: none;
  width: 100%;
  flex: 1;
  min-height: 0;
  max-width: 100vw;
  flex-direction: column;
  align-items: stretch;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.duel-result-cols {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.duel-result-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4vh 2vw;
  gap: 2.2vh;
  overflow-y: auto;
  min-height: 0;
}

.duel-result-panel.p1-bg { background: linear-gradient(160deg, #1a3a6b, #0d2040); }
.duel-result-panel.p2-bg { background: linear-gradient(160deg, #6b1a1a, #400d0d); }

.result-badge {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  padding: 1vh 3vw;
  border-radius: 16px;
  text-align: center;
  letter-spacing: 0.1em;
}
.badge-win  { background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff; box-shadow: 0 4px 20px rgba(243,156,18,.5); }
.badge-lose { background: rgba(255,255,255,0.1); color: rgba(255,255,255,.6); border: 2px solid rgba(255,255,255,.2); }

.result-player-name {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.54rem, 3.3vw, 2.64rem);
  color: #fff;
}

.result-score-big {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  color: #fff;
}

.result-stats {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 1.8vh 2vw;
  width: 100%;
  max-width: 360px;
}
.result-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1vh 0;
  border-bottom: 1px solid rgba(255,255,255,.12);
  font-size: clamp(1.35rem, 2.4vw, 1.8rem);
}
.result-stat-row:last-child { border-bottom: none; }
.stat-label { color: rgba(255,255,255,.7); }
.stat-value { color: #fff; font-weight: bold; }

.duel-result-footer {
  display: flex;
  justify-content: center;
  padding: 2vh;
  background: #111;
  flex-shrink: 0;
}
.home-btn {
  font-family: 'Jua', sans-serif;
  font-size: clamp(1.1rem, 2vw, 1.6rem);
  padding: 1.4vh 4vw;
  background: linear-gradient(135deg, #555, #333);
  color: #fff; border: none; border-radius: 12px;
  cursor: pointer;
  transition: transform .1s;
}
.home-btn:active { transform: scale(.97); }

/* ══════════ 1인용 결과 ══════════ */
#phase-result {
  display:none; flex-direction:column; align-items:center; gap:16px;
  width:100%; max-width: min(860px, 98vw);
  flex: 1; min-height: 0;
  padding: 1vh 8px;
  overflow-y: auto;
  justify-content: center;
}
.result-card {
  background:var(--cream); color:#222; border-radius:16px;
  padding: 3vh 2vw; box-shadow:var(--shadow);
  width:100%; text-align:center;
}
.result-emoji { font-size: clamp(3rem, 5vw, 5rem); margin-bottom:8px; }
.result-msg {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(1.5rem, 2.5vw, 2.4rem); color:#c0392b; margin-bottom:10px;
}
.result-score { font-size: clamp(1rem, 1.6vw, 1.5rem); color:#555; margin-bottom:4px; }
.result-big {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(2.5rem, 4vw, 3.9rem); color:#1a1a1a;
}
.result-btns { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
.result-btn {
  font-family:'Jua',sans-serif;
  font-size: clamp(1rem, 1.6vw, 1.4rem);

<script>
// ══ 오디오 ══
let actx = null, mGain = null;
function ensureAudioCtx(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  mGain = actx.createGain(); mGain.gain.value=0.6; mGain.connect(actx.destination);
}
function unlockAudio(){
  ensureAudioCtx();
  if(actx.state==='suspended') actx.resume();
  try {
    const buf=actx.createBuffer(1,1,22050); const src=actx.createBufferSource();
    src.buffer=buf; src.connect(actx.destination); src.start(0);
  } catch(e){}
}
document.addEventListener('visibilitychange', ()=>{ if(actx && !document.hidden && actx.state==='suspended') actx.resume(); });
function playNote(freq){
  ensureAudioCtx();
  if(actx.state==='suspended') actx.resume();
  const now=actx.currentTime, g=actx.createGain(), f=actx.createBiquadFilter();
  const o1=actx.createOscillator(); o1.type='triangle'; o1.frequency.value=freq;
  const o2=actx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
  const g2=actx.createGain(); g2.gain.value=0.2;
  const oh=actx.createOscillator(); oh.type='sine'; oh.frequency.value=freq*3;
  const gh=actx.createGain(); gh.gain.setValueAtTime(0.6,now); gh.gain.exponentialRampToValueAtTime(0.0001,now+0.1);
  o1.connect(f); o2.connect(g2).connect(f); oh.connect(gh).connect(f);
  f.type='lowpass'; f.frequency.setValueAtTime(4000,now); f.frequency.exponentialRampToValueAtTime(800,now+1);
  g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.4,now+0.005); g.gain.exponentialRampToValueAtTime(0.01,now+2);
  f.connect(g).connect(mGain);
  [o1,o2,oh].forEach(o=>{ o.start(now); try{o.stop(now+2.5);}catch(e){} });
}

function setSetting(key, val){
  cfg[key] = val;
  const prefixes = {range:'range-', oct:'oct-', qcount:'q-', diff:'diff-', answerMode:'ans-'};
  document.querySelectorAll(`[id^="${prefixes[key]}"]`).forEach(b=>b.classList.remove('active'));
  const ids = {
    range: {high:'range-high', low:'range-low'},
    oct:   {'1':'oct-1', '2':'oct-2'},
    qcount:{'10':'q-10','15':'q-15','20':'q-20'},
    diff:  {beginner:'diff-beginner',easy:'diff-easy',normal:'diff-normal',hard:'diff-hard'},
    answerMode: {piano:'ans-piano', button:'ans-button'},
  };
  document.getElementById(ids[key][val]).classList.add('active');
}

function setMode(m){
  cfg.mode = m;
  document.getElementById('mode-1p').classList.toggle('active', m===1);
  document.getElementById('mode-2p').classList.toggle('active', m===2);
  const notice = document.getElementById('mode-notice');
  const diffRow = document.getElementById('difficulty-row');
  const qLabel = document.getElementById('qcount-label');
  if(m===2){
    notice.classList.add('show');
    // 피아노 건반 강제 비활성
    document.getElementById('ans-piano').classList.add('disabled-look');
    document.getElementById('ans-piano').disabled = true;
    // 큰 버튼 강제 선택
    if(cfg.answerMode === 'piano'){

    // 난이도 숨김, 문제 수 라벨 변경

    qLabel.textContent = '맞혀야 하는 문제의 수';
    document.getElementById('duel-qcount-desc').style.display = '';

    notice.classList.remove('show');
    document.getElementById('ans-piano').classList.remove('disabled-look');
    document.getElementById('ans-piano').disabled = false;
    diffRow.style.display = '';
    qLabel.textContent = '문제의 수';
    document.getElementById('duel-qcount-desc').style.display = 'none';
  }
}

  }
  if(cfg.range==='low'){
    pool = pool.concat(NOTES_BASS.filter(n=>{
      if(cfg.oct!=='2') return ['C3','D3','E3','F3','G3','A3','B3','C4'].includes(n.n);
      return true;
    }));
  }
  return pool;
}

function makeQuestions(total){
  const pool = buildQuestionPool();
  const qs = [];
  let lastNote = null;
  for(let i=0;i<total;i++){
    let pick, tries=0;
    do { pick=pool[Math.floor(Math.random()*pool.length)]; tries++; }
    while(pick.n===lastNote && tries<20 && pool.length>1);
    qs.push(pick);
    lastNote = pick.n;
  }
  return qs;
}

function startGame(){
  if(cfg.mode===2) startDuel();
  else startQuiz();
}

let questions=[], qIdx=0, score=0, timeLeft=0, timerInterval=null, canAnswer=true;
let quizActive=false, showQuestionTimeout=null, isPaused=false, usedPause=false;

function startQuiz(){
  const total = parseInt(cfg.qcount);
  questions = makeQuestions(total);
  qIdx=0; score=0; canAnswer=true; usedPause=false; quizActive=true; isPaused=false;

  const isHigh = cfg.range==='high';
  let kbMin, kbMax;
  if(isHigh){ kbMin='C4'; kbMax=cfg.oct==='2'?'B5':'C5'; }
  else       { kbMin=cfg.oct==='2'?'C2':'C3'; kbMax='C4'; }

  document.getElementById('phase-settings').style.display='none';
  document.getElementById('phase-result').style.display='none';
  document.getElementById('phase-quiz').style.display='flex';

  if(cfg.answerMode==='piano'){
    document.getElementById('answer-piano').style.display='';
    document.getElementById('answer-buttons').style.display='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ buildKb(kbMin, kbMax); }));
  } else {
    document.getElementById('answer-piano').style.display='none';
    document.getElementById('answer-buttons').style.display='';
  }
  showQuestion();
}

function showQuestion(){
  if(!quizActive) return;
  if(qIdx>=questions.length){ endQuiz(); return; }
  canAnswer=false;
  clearInterval(timerInterval);
  const svg=document.getElementById('quiz-staff');
  svg.innerHTML='';
  document.getElementById('q-progress').textContent='';
  clearTimeout(showQuestionTimeout);
  showQuestionTimeout = setTimeout(()=>{
    if(!quizActive) return;
    if(qIdx>=questions.length){ endQuiz(); return; }
    canAnswer=true;
    const nd=questions[qIdx];
    document.getElementById('q-progress').textContent=`(${qIdx+1}/${questions.length})`;
    drawStaff(nd, 'quiz-staff');
    document.querySelectorAll('.key').forEach(k=>k.classList.remove('ref-do'));
    const refKeyNote = (nd.clef==='treble') ? 'C4' : 'C3';
    const refKeyEl = document.querySelector(`[data-note="${refKeyNote}"]`);
    if(refKeyEl) refKeyEl.classList.add('ref-do');
    timeLeft = diffTime[cfg.diff];
    document.getElementById('timer-num').textContent=timeLeft;
    timerInterval = setInterval(()=>{
      if(isPaused) return;
      timeLeft--;
      document.getElementById('timer-num').textContent=timeLeft;
      if(timeLeft<=0){ clearInterval(timerInterval); timeUp(); }
    },1000);
  },200);
}

function timeUp(){
  if(!canAnswer) return;
  canAnswer=false;
  const nd=questions[qIdx];
  showFeedback(false,`시간 초과! 정답은 '${nd.k}'입니다.`);
  setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1800);
}

function onNoteBtn(noteName){
  unlockAudio();
  if(!canAnswer) return;
  if(document.getElementById('phase-quiz').style.display==='none') return;
  canAnswer=false;
  clearInterval(timerInterval);
  const nd=questions[qIdx];
  playNote(nd.f);
  if(noteName===nd.k){
    score++;
    showFeedback(true,'정답! ✓');
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1000);
  } else {
    showFeedback(false,`땡! 정답은 '${nd.k}'입니다.`);
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1800);
  }
}

function onKey(keyNote){
  if(!canAnswer) return;
  if(document.getElementById('phase-quiz').style.display==='none'){ playNote(keyNote.f); return; }
  playNote(keyNote.f);
  canAnswer=false;
  clearInterval(timerInterval);
  const nd=questions[qIdx];
  if(keyNote.n===nd.n){
    score++;
    showFeedback(true,'정답! ✓');
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1000);
  } else {
    showFeedback(false,`땡! 정답은 '${nd.k}'입니다.`);
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1800);
  }
}

function showFeedback(ok, msg){
  const box=document.getElementById('feedback-box');
  box.textContent=msg; box.className=ok?'correct':'wrong';
  document.getElementById('feedback-overlay').style.display='flex';
}
function hideFeedback(){
  document.getElementById('feedback-overlay').style.display='none';
}

function endQuiz(){
  clearInterval(timerInterval);
  document.getElementById('phase-quiz').style.display='none';
  document.getElementById('phase-result').style.display='flex';
  const total=questions.length, pct=total>0?Math.round(score/total*100):0;
  let emoji, msg;
  if(pct<=50) { emoji='😓'; msg='갈 길이 멀군요. 파이팅!'; }
  else if(pct<=70) { emoji='🙂'; msg='연습이 조금 더 필요합니다.'; }
  else if(pct<=80) { emoji='😊'; msg='그럭저럭 읽을 수 있겠군요.'; }
  else if(pct<=90) { emoji='😄'; msg='나쁘지 않아요.'; }
  else { emoji='🏆'; msg='훌륭합니다!'; }
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-msg').textContent=msg;
  document.getElementById('result-score').textContent=`${total}문제 중 ${score}개 정답`;
  document.getElementById('result-pct').textContent=`${pct}%`;
  const rangeLabel = cfg.range==='high' ? '높은 음자리표' : '낮은 음자리표';
  const octLabel = cfg.oct==='1' ? '한 옥타브' : '두 옥타브';
  const ansLabel = cfg.answerMode==='piano' ? '피아노 건반' : '큰 버튼';
  const pauseLabel = usedPause ? ' · ⏸ 일시정지 사용함' : '';
  document.getElementById('result-summary').textContent=`${rangeLabel} · ${octLabel} · ${ansLabel}${pauseLabel}`;
}

function togglePause(){
  if(isPaused){
    isPaused=false;
    document.getElementById('btn-pause').textContent='⏸ 일시정지';
    document.getElementById('btn-pause').style.background='#e67e22';
    clearInterval(timerInterval);
    if(timeLeft>0){
      timerInterval = setInterval(()=>{
        if(isPaused) return;
        timeLeft--;
        document.getElementById('timer-num').textContent=timeLeft;
        if(timeLeft<=0){ clearInterval(timerInterval); timeUp(); }
      },1000);
    }
    canAnswer=true;
  } else {
    isPaused=true; usedPause=true;
    clearInterval(timerInterval); canAnswer=false;
    document.getElementById('btn-pause').textContent='▶ 이어서 하기';
    document.getElementById('btn-pause').style.background='#27ae60';
  }
}

function retryQuiz(){
  clearInterval(timerInterval); clearTimeout(showQuestionTimeout);
  quizActive=false; isPaused=false; usedPause=false; canAnswer=false;
  questions=[]; qIdx=0; score=0; timeLeft=0;
  hideFeedback();
  document.getElementById('phase-result').style.display='none';
  startQuiz();
}

// 각 플레이어 상태
const duel = {
  targetScore: 10,
  over: false,
  p: [
    { questions:[], qIdx:0, score:0, canAnswer:false, feedback:null, timeout:null, totalAttempts:0, wrongCount:0, startTimes:[], endTimes:[] },
    { questions:[], qIdx:0, score:0, canAnswer:false, feedback:null, timeout:null, totalAttempts:0, wrongCount:0, startTimes:[], endTimes:[] },
  ]
};

const NOTE_LABELS = ['도','레','미','파','솔','라','시'];

function startDuel(){
  duel.targetScore = parseInt(cfg.qcount);
  duel.over = false;

  // 두 플레이어 각각 큰 문제 풀 (50문제 이상 여유있게)
  const BIG = 50;
  for(let pi=0; pi<2; pi++){
    const p = duel.p[pi];
    p.questions = makeQuestions(BIG);
    p.qIdx=0; p.score=0; p.canAnswer=false;
    p.feedback=null; p.timeout=null;
    p.totalAttempts=0; p.wrongCount=0;
    p.startTimes=[]; p.endTimes=[];
  }

  // 점수 표시 업데이트
  document.getElementById('p1-score').textContent='0';
  document.getElementById('p2-score').textContent='0';
  document.getElementById('p1-score-total').textContent=`/ ${duel.targetScore}`;
  document.getElementById('p2-score-total').textContent=`/ ${duel.targetScore}`;

  // 버튼 생성
  buildDuelButtons(0);
  buildDuelButtons(1);

  // 화면 전환
  document.getElementById('phase-settings').style.display='none';
  document.getElementById('phase-duel-result').style.display='none';
  document.getElementById('phase-duel').style.display='flex';

  // 첫 문제
  setTimeout(()=>{ duelShowQuestion(0); duelShowQuestion(1); }, 100);
}

function buildDuelButtons(pi){
  const el = document.getElementById(`p${pi+1}-btns`);
  el.innerHTML='';
  NOTE_LABELS.forEach(note=>{
    const btn = document.createElement('button');
    btn.className = 'duel-note-btn';
    btn.textContent = note;
    btn.addEventListener('pointerdown', e=>{ unlockAudio(); e.preventDefault(); duelAnswer(pi, note); });
    el.appendChild(btn);
  });
  // 7번째 버튼 → 4열 grid에서 마지막 행 중앙에 오게 (아무것도 안 해도 되지만 시각 보정)
}

function duelShowQuestion(pi){
  if(duel.over) return;
  const p = duel.p[pi];
  const svgId = `p${pi+1}-staff`;
  const labelId = `p${pi+1}-q-label`;

  if(p.qIdx >= p.questions.length){
    // 문제 부족하면 추가 생성
    p.questions = p.questions.concat(makeQuestions(20));
  }

  p.canAnswer = false;
  document.getElementById(svgId).innerHTML='';
  document.getElementById(labelId).textContent='';

  // 버튼 비활성화
  setDuelBtnsEnabled(pi, false);

  clearTimeout(p.timeout);
  p.timeout = setTimeout(()=>{
    if(duel.over) return;
    const nd = p.questions[p.qIdx];
    document.getElementById(labelId).textContent=`문제 ${p.qIdx+1}`;
    drawStaff(nd, svgId);
    p.canAnswer = true;
    p.startTimes.push(Date.now());
    setDuelBtnsEnabled(pi, true);
  }, 180);
}

function setDuelBtnsEnabled(pi, enabled){
  const el = document.getElementById(`p${pi+1}-btns`);
  el.querySelectorAll('.duel-note-btn').forEach(b=>{ b.disabled=!enabled; });
}

function duelAnswer(pi, noteName){
  if(duel.over) return;
  const p = duel.p[pi];
  if(!p.canAnswer) return;
  p.canAnswer = false;
  setDuelBtnsEnabled(pi, false);

  const nd = p.questions[p.qIdx];
  playNote(nd.f);
  p.totalAttempts++;
  p.endTimes.push(Date.now());

  const correct = (noteName === nd.k);
  if(correct){
    p.score++;
    document.getElementById(`p${pi+1}-score`).textContent = p.score;
    showDuelFeedback(pi, true, '정답! ✓');

    if(p.score >= duel.targetScore){
      // 승리
      duel.over = true;
      setTimeout(()=>{ endDuel(pi); }, 900);
      return;
    }

    setTimeout(()=>{
      hideDuelFeedback(pi);
      p.qIdx++;
      duelShowQuestion(pi);
    }, 800);
  } else {
    p.wrongCount++;
    showDuelFeedback(pi, false, `땡! '${nd.k}' 이에요`);
    setTimeout(()=>{
      hideDuelFeedback(pi);
      p.qIdx++;
      duelShowQuestion(pi);
    }, 1200);
  }
}

function showDuelFeedback(pi, ok, msg){
  const fb = document.getElementById(`p${pi+1}-feedback`);
  const box = document.getElementById(`p${pi+1}-feedback-box`);
  box.textContent = msg;
  box.className = 'duel-feedback-box ' + (ok ? 'correct' : 'wrong');
  fb.classList.add('show');
}
function hideDuelFeedback(pi){
  document.getElementById(`p${pi+1}-feedback`).classList.remove('show');
}

function endDuel(winnerPi){
  // 다른 플레이어 입력도 막기
  duel.p.forEach((p,i)=>{
    p.canAnswer = false;
    setDuelBtnsEnabled(i, false);
  });

  // 결과 계산
  const loserPi = winnerPi === 0 ? 1 : 0;

  for(let pi=0; pi<2; pi++){
    const p = duel.p[pi];
    const correctCount = p.score;
    const attempts = p.totalAttempts;
    const wrongCount = p.wrongCount;
    const wrongRate = attempts > 0 ? Math.round(wrongCount / attempts * 100) : 0;

    // 평균 반응 시간 계산
    let avgSec = '—';
    const times = p.endTimes;
    const starts = p.startTimes;
    const pairs = Math.min(times.length, starts.length);
    if(pairs > 0){
      let totalMs = 0;
      for(let i=0; i<pairs; i++) totalMs += (times[i] - starts[i]);
      avgSec = (totalMs / pairs / 1000).toFixed(1) + '초';
    }

    // 배지
    const isWinner = (pi === winnerPi);
    document.getElementById(`p${pi+1}-result-badge`).textContent = isWinner ? '🏆 승리!' : '😢 아쉽..';
    document.getElementById(`p${pi+1}-result-badge`).className = 'result-badge ' + (isWinner ? 'badge-win' : 'badge-lose');
    document.getElementById(`p${pi+1}-result-score`).textContent = `${correctCount}문제 정답`;

    // 통계
    const statsEl = document.getElementById(`p${pi+1}-result-stats`);
    statsEl.innerHTML = `
      <div class="result-stat-row">
        <span class="stat-label">맞힌 문제</span>
        <span class="stat-value">${correctCount}개</span>
      </div>
      <div class="result-stat-row">
        <span class="stat-label">총 시도 횟수</span>
        <span class="stat-value">${attempts}번</span>
      </div>
      <div class="result-stat-row">
        <span class="stat-label">오답률</span>
        <span class="stat-value">${wrongRate}%</span>
      </div>
      <div class="result-stat-row">
        <span class="stat-label">문제당 평균 반응속도</span>
        <span class="stat-value">${avgSec}</span>
      </div>
    `;
  }

  setTimeout(()=>{
    document.getElementById('phase-duel').style.display='none';
    document.getElementById('phase-duel-result').style.display='flex';
  }, 1000);
}

function goHome(){

  timerInterval=null; showQuestionTimeout=null;

// ══ SVG 오선지 그리기 ══
function se(p, tag, attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  p.appendChild(el); return el;
}
const TREBLE_CLEF = '\u{1D11E}';
const BASS_CLEF   = '\u{1D122}';

function drawStaff(nd, svgId){
  const svg = document.getElementById(svgId);
  svg.innerHTML='';
  const W=360, H=210, line1y=155, lineGap=18, halfGap=9;
  const isBass = nd.clef==='bass';

  se(svg,'rect',{width:W,height:H,fill:'#fdf6e3',rx:8});
  for(let i=0;i<5;i++){
    const y=line1y-i*lineGap;
    se(svg,'line',{x1:10,x2:W-10,y1:y,y2:y,stroke:'#8b3a1a','stroke-width':1.6});
  }
  se(svg,'line',{x1:10,x2:10,y1:line1y-4*lineGap,y2:line1y,stroke:'#8b3a1a','stroke-width':2});
  se(svg,'line',{x1:W-10,x2:W-10,y1:line1y-4*lineGap,y2:line1y,stroke:'#8b3a1a','stroke-width':2.5});
  se(svg,'line',{x1:W-15,x2:W-15,y1:line1y-4*lineGap,y2:line1y,stroke:'#8b3a1a','stroke-width':1.2});

  const clefEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  if(isBass){
    clefEl.setAttribute('x','8'); clefEl.setAttribute('y',String(line1y-lineGap*1.5+25));
    clefEl.setAttribute('font-size','90');
  } else {
    clefEl.setAttribute('x','4'); clefEl.setAttribute('y',String(line1y+lineGap*0.6-10));
    clefEl.setAttribute('font-size','125');
  }
  clefEl.setAttribute('fill','#8b1a1a');
  clefEl.setAttribute('font-family','MusicClef, serif');
  clefEl.textContent = isBass ? BASS_CLEF : TREBLE_CLEF;
  svg.appendChild(clefEl);

  const step=nd.s, nx=270, ny=line1y-step*halfGap, r=9;

  function drawLedger(st){
    se(svg,'line',{x1:nx-r-6,x2:nx+r+6,y1:line1y-st*halfGap,y2:line1y-st*halfGap,stroke:'#8b3a1a','stroke-width':1.8});
  }
  if(step<=-2){ for(let st=-2;st>=step;st-=2) drawLedger(st); }
  if(step>=10){ for(let st=10;st<=step;st+=2) drawLedger(st); }

  const refStep = isBass ? 3 : -2;
  const refNx   = 120;
  const refNy   = line1y - refStep * halfGap;
  if(!isBass && refStep <= -2){
    for(let st=refStep; st<=-2; st+=2){
      se(svg,'line',{x1:refNx-r-6,x2:refNx+r+6,y1:line1y-st*halfGap,y2:line1y-st*halfGap,stroke:'#8b3a1a','stroke-width':1.8});
    }
  }
  se(svg,'ellipse',{cx:refNx,cy:refNy,rx:r+1,ry:r-1,fill:'#f1c40f',stroke:'#e67e22','stroke-width':1.5,transform:`rotate(-15,${refNx},${refNy})`});
  se(svg,'ellipse',{cx:nx,cy:ny,rx:r+1,ry:r-1,fill:'#8b1a1a',transform:`rotate(-15,${nx},${ny})`});
  const stemUp = step<5;
  if(stemUp) se(svg,'line',{x1:nx+r,x2:nx+r,y1:ny,y2:ny-48,stroke:'#8b1a1a','stroke-width':2.5});
  else       se(svg,'line',{x1:nx-r,x2:nx-r,y1:ny,y2:ny+48,stroke:'#8b1a1a','stroke-width':2.5});
}

// ══ 건반 생성 ══
function buildKb(minNote, maxNote){
  const kb = document.getElementById('piano-keyboard');
  kb.innerHTML='';
  const allWhite = PIANO_NOTES.filter(n=>!n.acc);
  const wLocal = allWhite.filter(n=>{
    const noteNum = n.o*12 + 'CDEFGAB'.indexOf(n.n[0]);
    const minNum = parseInt(minNote.slice(-1))*12 + 'CDEFGAB'.indexOf(minNote[0]);
    const maxNum = parseInt(maxNote.slice(-1))*12 + 'CDEFGAB'.indexOf(maxNote[0]);
    return noteNum>=minNum && noteNum<=maxNum;
  });
  const wIdxLocal = {}; wLocal.forEach((n,i)=>wIdxLocal[n.n]=i);
  wLocal.forEach((n,i)=>{
    const el=document.createElement('div');
    el.className='key white'; el.dataset.note=n.n;
    const lbl=document.createElement('div');
    lbl.className='key-label'; lbl.textContent=n.k;
    el.appendChild(lbl);
    el.addEventListener('pointerdown',e=>{ unlockAudio(); e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('pressed'); onKey(n); });
    el.addEventListener('pointerup',  e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    el.addEventListener('pointercancel',e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    kb.appendChild(el);
  });
  kb.style.position='relative';
  PIANO_NOTES.filter(n=>n.acc).forEach(n=>{
    const left=blackAfter[n.n]; if(!left) return;
    const li=wIdxLocal[left]; if(li===undefined) return;
    const el=document.createElement('div');
    el.className='key black'; el.dataset.note=n.n;
    el.style.left=(li*WW+WW-16)+'px'; el.style.top='0';
    el.addEventListener('pointerdown',e=>{ unlockAudio(); e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('pressed'); onKey(n); });
    el.addEventListener('pointerup',  e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    el.addEventListener('pointercancel',e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    kb.appendChild(el);
  });

  const pianoCase = kb.closest('.piano-case') || kb.parentElement.parentElement;
  const containerW = pianoCase.clientWidth - 26;
  const numWhite = wLocal.length;
  const dynWW = Math.max(WW, Math.floor(containerW / numWhite));
  const dynBW = Math.round(dynWW * 32/52);

  kb.querySelectorAll('.key.white').forEach(el=>{ el.style.width=dynWW+'px'; });
  kb.querySelectorAll('.key.black').forEach(el=>{
    const leftNote = Object.entries(blackAfter).find(([k])=>k===el.dataset.note)?.[1];
    if(!leftNote) return;
    const li = wIdxLocal[leftNote];
    if(li===undefined) return;
    el.style.left=(li*dynWW+dynWW-Math.round(dynBW/2)-2)+'px';
    el.style.width=dynBW+'px';
  });
  kb.style.width=(numWhite*dynWW)+'px';

  const keyArea = kb.parentElement;
  setTimeout(()=>{
    const kbW = numWhite*dynWW;
    const areaW = keyArea.getBoundingClientRect().width;
    keyArea.style.overflow = 'hidden';
    keyArea.style.overflowX = kbW > areaW+1 ? 'auto' : 'hidden';
    keyArea.style.paddingBottom = kbW > areaW+1 ? '4px' : '8px';
  },50);
}

buildKb('C4','C5');
window.addEventListener('resize', ()=>{
  if(document.getElementById('phase-quiz').style.display!=='none' && cfg.answerMode==='piano'){
    const isHigh = cfg.range==='high';
    let kbMin, kbMax;
    if(isHigh){ kbMin='C4'; kbMax=cfg.oct==='2'?'B5':'C5'; }
    else       { kbMin=cfg.oct==='2'?'C2':'C3'; kbMax='C4'; }
    buildKb(kbMin, kbMax);
  }
});

window.addEventListener('pointerup',()=>{});
window.addEventListener('pointercancel',()=>{});
const pianoKb = document.getElementById('piano-keyboard');
pianoKb.addEventListener('touchstart',e=>{ unlockAudio(); e.preventDefault(); },{passive:false});
pianoKb.addEventListener('touchmove',e=>{
  const area=e.currentTarget.parentElement;
  const touch=e.touches[0];
  const rect=area.getBoundingClientRect();
  if(touch.clientY>rect.bottom-24) return;
  e.preventDefault();
},{passive:false});
</script>
