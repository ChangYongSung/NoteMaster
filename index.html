:root {
  --red:    #c0392b;
  --red2:   #e74c3c;
  --dark:   #1a0a0a;
  --cream:  #fdf6e3;
  --gold:   #f39c12;
  --green:  #27ae60;
  --blue:   #2980b9;
  --shadow: 0 4px 20px rgba(0,0,0,.25);
  --p1-col: #1a6bbf;
  --p2-col: #b81a1a;
  --p1-light: #d6e9ff;
  --p2-light: #ffd6d6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html {
  height: 100%;
}
body {
  font-family:'Jua',sans-serif;
  background: linear-gradient(135deg,#1a0505 0%,#2d0a0a 50%,#1a0505 100%);
  height: 100dvh;
  min-height: -webkit-fill-available;
  color:#fff;
  display:flex; flex-direction:column; align-items:center;
  padding: 0;
  overflow: hidden;
}

/* ══════════ 설정 화면 ══════════ */
#phase-settings {
  background: var(--cream);
  color: #222;
  border-radius: 16px;
  padding: 2vh 2vw;
  box-shadow: var(--shadow);
  width: fit-content;
  max-width: min(900px, 98vw);
  min-width: min(680px, 98vw);
  margin: 1vh auto;
  display: flex;
  flex-direction: column;
  gap: 1.2vh;
  overflow-y: auto;
  max-height: calc(100vh - 2vh);
}

h1 {
  font-family:'Jua',sans-serif;
  font-size: 2.76rem;
  letter-spacing:.02em;
  color:#c0392b;
  text-align:center;
  margin-bottom: 0.5vh;
}
h1 span { color:#f39c12; }

.setting-row { display:flex; flex-direction:column; gap:4px; }
.setting-label {
  font-size: 1.38rem;
  font-weight:bold; color:#7b2d2d;
  border-left:4px solid var(--red); padding-left:10px;
}
.btn-group-row { display:flex; gap:6px; flex-wrap:wrap; }
.opt-btn {
  font-family:'Jua',sans-serif;
  font-size: 1.06rem;
  padding: 2px 9px; border:2px solid #ccc; border-radius:10px;
  background:#fff; color:#555; cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.opt-btn.active {
  background:var(--gold); color:#fff; border-color:var(--gold);
  box-shadow:0 2px 8px rgba(243,156,18,.4);
}
.opt-btn:hover:not(.active) { border-color:#f39c12; color:#e67e22; }

.opt-btn.disabled-look {
  background:#ddd !important; color:#aaa !important;
  border-color:#ccc !important; cursor:not-allowed !important;
  text-decoration: line-through;
}

/* ══ 난이도 슬라이더 ══ */
.diff-slider-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 4px 2px;
  width: 100%;
  max-width: 240px;
  box-sizing: border-box;
}
.diff-slider-track {
  position: relative;
  height: 36px;
  display: flex;
  align-items: center;
  width: 100%;
}
.diff-slider-line {
  position: absolute;
  left: 0; right: 0;
  height: 6px;
  background: #ddd;
  border-radius: 3px;
  top: 50%;
  transform: translateY(-50%);
}
.diff-slider-fill {
  position: absolute;
  left: 0;
  height: 6px;
  background: linear-gradient(90deg, #27ae60, #a8d520, #f39c12, #e74c3c, #c0392b);
  border-radius: 3px;
  top: 50%;
  transform: translateY(-50%);
  transition: width .15s;
}
input.diff-slider {
  position: absolute;
  left: 0; right: 0;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  height: 36px;
  margin: 0;
  cursor: pointer;
  z-index: 2;
  transform: scaleX(-1);
}
input.diff-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--thumb-color, #27ae60);
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
  cursor: grab;
}
input.diff-slider::-moz-range-thumb {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--thumb-color, #27ae60);
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
  cursor: grab;
}
input.diff-slider:active::-webkit-slider-thumb { cursor: grabbing; }
input.diff-slider:active::-moz-range-thumb     { cursor: grabbing; }

.diff-ticks {
  display: flex;
  justify-content: space-between;
  padding: 0 2px;
}
.diff-tick {
  font-family: 'Jua', sans-serif;
  font-size: 0.82rem;
  color: #888;
  text-align: center;
  min-width: 20px;
  transition: color .15s, font-weight .15s;
}
.diff-tick.active-tick {
  color: #c0392b;
  font-weight: bold;
}
.diff-cur-label {
  font-family: 'Jua', sans-serif;
  font-size: 1rem;
  color: #7b2d2d;
  font-weight: bold;
  text-align: center;
}

/* ══ 토글 스위치 ══ */
.toggle-switch {
  position: relative;
  width: 38px;
  height: 20px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0;
  width: 0; height: 0;
  position: absolute;
}
.toggle-track {
  position: absolute;
  inset: 0;
  background: #ccc;
  border-radius: 20px;
  cursor: pointer;
  transition: background .25s;
}
.toggle-track::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
  transition: transform .25s;
}
.toggle-switch input:checked + .toggle-track {
  background: #90d98a;
}
.toggle-switch input:checked + .toggle-track::after {
  transform: translateX(18px);
}

/* 설정 행 2열 레이아웃 */
.settings-cols {
  display: flex;
  gap: calc(2vw + 10px);
  flex-wrap: wrap;
}
.settings-col {
  flex: 1;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 0.8vh;
}

.start-btn {
  font-family:'Jua',sans-serif;
  font-size: 2.0rem;
  padding: 18px 0;
  width: 240px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,#c0392b,#e74c3c);
  color:#fff; cursor:pointer; align-self:flex-start; margin-top: 0.5vh;
  box-shadow:0 4px 16px rgba(192,57,43,.5);
  transition:transform .1s, box-shadow .1s;
}
.start-btn:active { transform:scale(.97); }

/* 2인용 모드 안내 배너 */
.mode-notice {
  background: #fff3cd;
  border: 2px solid #f39c12;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: clamp(0.82rem, 1.3vw, 1.05rem);
  color: #856404;
  display: none;
}
.mode-notice.show { display: block; }

/* ══════════ 퀴즈 화면 (1인용) ══════════ */
#phase-quiz {
  display:none;
  flex-direction:column;
  align-items:center;
  gap: 1vh;
  width:100%;
  max-width: min(860px, 98vw);
  flex: 1;
  min-height: 0;
  padding: 1vh 8px;
  overflow: hidden;
}

.quiz-top {
  display:flex; gap:10px; width:100%;
  align-items:stretch;
}

.question-card {
  background:#fdf6e3; border:3px solid #c8b89a; border-radius:14px;
  padding: 1vh 1vw; flex:1;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  min-height: 140px;
}
.q-label {
  font-size: clamp(2rem, 3.6vw, 3.2rem); color:#000; font-weight:bold;
}
.q-num { color:#c0392b; }

.timer-card {
  background:#fff; border:3px solid #ddd; border-radius:14px;
  padding: 8px 12px; flex:0 0 140px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
}
.timer-label { font-size: clamp(1.5rem, 2.25vw, 2.4rem); color:#888; font-weight:bold; }
#timer-num {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(5.25rem, 9vw, 9rem); color:#1a1a1a; line-height:1;
}
#timer-unit { font-size: clamp(1.8rem, 2.7vw, 2.7rem); color:#555; }

/* 1인용 버튼 영역 */
#answer-buttons {
  width:100%;
  max-width: min(860px, 98vw);
}
.note-btns-wrap {
  display: flex;
  gap: clamp(4px, 1vw, 12px);
  flex-wrap: nowrap;
  justify-content: center;
  padding: 16px 0;
  width: 100%;
}
.note-btn {
  font-family:'Jua',sans-serif;
  font-size: clamp(1.3rem, 3.2vw, 2.42rem);
  flex: 1;
  height: clamp(60px, 14vw, 100px);
  border:none; border-radius:16px;
  background:linear-gradient(135deg,#c0392b,#e74c3c);
  color:#fff; cursor:pointer;
  box-shadow:0 4px 12px rgba(192,57,43,.4);
  transition:transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  display: flex; align-items: center; justify-content: center;
}
.note-btn:active { transform:scale(.93); box-shadow:0 2px 6px rgba(192,57,43,.3); }
.note-btn:disabled { background:#aaa; box-shadow:none; cursor:default; }

/* 임시표 버튼 (♯ / ♭) */
.acc-btn-sharp {
  background: linear-gradient(135deg, #1a6bbf, #2980b9) !important;
  box-shadow: 0 4px 12px rgba(26,107,191,.4) !important;
  font-size: 2.8rem !important;
}
.acc-btn-flat {
  background: linear-gradient(135deg, #7b2d8b, #9b59b6) !important;
  box-shadow: 0 4px 12px rgba(123,45,139,.4) !important;
  font-size: 2.8rem !important;
}
/* 임시표 버튼 눌린(선택) 상태 */
.acc-active {
  transform: scale(0.93);
  outline: 4px solid #fff;
  outline-offset: -3px;
  filter: brightness(1.25);
}

/* 피아노 케이스 */
.piano-case {
  background:linear-gradient(180deg,#8B2A2A 0%,#6B1A1A 40%,#7A2020 70%,#5C1515 100%);
  border-radius:12px; padding:8px 12px 10px;
  box-shadow:0 6px 24px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.1);
  border:2px solid #A03030; width:100%;
  max-width: min(860px, 98vw);
}
.piano-key-area {
  background:#111; border-radius:4px;
  box-shadow:inset 0 3px 8px rgba(0,0,0,.7); overflow:hidden;
  touch-action:pan-x; -webkit-user-select:none; user-select:none;
  padding-bottom:8px;
}
.piano-key-area::-webkit-scrollbar { height:18px; }
.piano-key-area::-webkit-scrollbar-track { background:#222; border-radius:10px; }
.piano-key-area::-webkit-scrollbar-thumb { background:#999; border-radius:10px; border:3px solid #222; min-width:60px; }
.piano-key-area::-webkit-scrollbar-thumb:hover { background:#bbb; }
.piano-key-area { scrollbar-width:auto; scrollbar-color:#999 #222; }
#piano-keyboard { position:relative; display:flex; height:132px; min-width:max-content; }
.key.white {
  width:52px; height:128px; background:#fff;
  border-radius:0 0 5px 5px; z-index:1; touch-action:none;
  border:1px solid #bbb; border-top:none; transition:background .07s;
  position:relative;
}
.key.white.pressed, .key.white:active { background:#ffe0b2; }
.key.white.ref-do { background:#fef08a; }
.key.white.ref-do .key-label { color:#b45309; font-weight:bold; }
.key.black {
  width:32px; height:72px; touch-action:none;
  background:linear-gradient(180deg,#3a3a3a 0%,#111 100%);
  border-radius:0 0 4px 4px; z-index:2;
  border:1px solid #000; border-top:none; transition:background .07s;
  position:absolute;
}
.key.black.pressed, .key.black:active { background:linear-gradient(180deg,#555 0%,#333 100%); }
.key-label {
  font-family:'Jua',sans-serif; font-size:15px; pointer-events:none;
  text-align:center; line-height:1.1;
}
.key.white .key-label { color:#1a237e; position:absolute; bottom:6px; width:100%; }

/* 피드백 오버레이 (1인용) */
#feedback-overlay {
  position:fixed; inset:0;
  display:none; align-items:center; justify-content:center;
  z-index:100; pointer-events:none;
}
#feedback-box {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  padding: 20px 40px;
  border-radius:20px; text-align:center; line-height:1.4;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  animation: popIn .2s ease;
}
#feedback-box.correct { background:#27ae60; color:#fff; }
#feedback-box.wrong   { background:#c0392b; color:#fff; }
@keyframes popIn {
  from { transform:scale(.7); opacity:0; }
  to   { transform:scale(1);  opacity:1; }
}

/* ══════════ 2인 대전 화면 ══════════ */
#phase-duel {
  display: none;
  width: 100%;
  flex: 1;
  min-height: 0;
  max-width: 100vw;
  flex-direction: column;
  align-items: stretch;
  gap: 0;
  overflow: hidden;
}

.duel-header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.3vh 1vw;
  gap: 1vw;
  flex-shrink: 0;
}

.duel-players {
  display: flex;
  flex: 1;
  gap: 6px;
  padding: 0 6px 4px;
  overflow: hidden;
  min-height: 0;
}

.player-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  gap: 0;
  min-width: 0;
}

.player-panel.p1 { --pc: var(--p1-col); --pc-light: var(--p1-light); }
.player-panel.p2 { --pc: var(--p2-col); --pc-light: var(--p2-light); }

/* 이름 + 점수를 하나의 헤더 영역으로 통합 */
.player-header {
  background: var(--pc);
  color: #fff;
  text-align: center;
  padding: 6px 0 4px;
  border-radius: 10px 10px 0 0;
  flex-shrink: 0;
}
.player-name {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.3rem, 3vw, 2rem);
  letter-spacing: 0.05em;
  line-height: 1.1;
}

.score-display {
  background: var(--pc);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.3vw;
  padding: 2px 0 8px;
  flex-shrink: 0;
}
.score-current {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(2rem, 4.5vw, 3.2rem);
  color: #fff;
  line-height: 1;
}
.score-total {
  font-size: clamp(1.1rem, 2.2vw, 1.6rem);
  color: rgba(255,255,255,0.75);
  align-self: flex-end;
  padding-bottom: 3px;
}

/* 오선지 영역: 남는 공간을 모두 차지 */
.duel-staff-wrap {
  background: var(--pc-light);
  border: 2px solid var(--pc);
  border-radius: 0;
  padding: 4px 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.duel-staff-wrap svg {
  display: block;
  width: 96%;
  max-width: 380px;
  height: auto;
  max-height: 100%;
  flex-shrink: 1;
}
.duel-q-label {
  font-size: clamp(1.3rem, 2.6vw, 1.82rem);
  color: #444;
  font-weight: bold;
}

/* 버튼 영역 */
.duel-btns-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pc-light);
  border: 2px solid var(--pc);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 5px 0.5vw;
  flex-shrink: 0;
}

.duel-note-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  width: 100%;
}

.duel-note-btn {
  font-family: 'Jua', sans-serif;
  font-size: clamp(1.5rem, 3.2vw, 2.4rem);
  aspect-ratio: auto;
  height: 77px;
  width: 100%;
  border: none;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  transition: transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  padding: 0;
}
.p1 .duel-note-btn {
  background: linear-gradient(135deg, #1565c0, #1a6bbf);
  box-shadow: 0 4px 0 #0d3f7a;
}
.p2 .duel-note-btn {
  background: linear-gradient(135deg, #b81a1a, #e53935);
  box-shadow: 0 4px 0 #7a0d0d;
}
.duel-note-btn:active {
  transform: translateY(3px);
  box-shadow: none;
}
.duel-note-btn:disabled { background: #aaa !important; box-shadow: none; cursor: default; }

/* 2인 대전 임시표 버튼 (플레이어 색 덮어쓰기) */
.p1 .duel-note-btn.acc-btn-sharp,
.p2 .duel-note-btn.acc-btn-sharp {
  background: linear-gradient(135deg, #1a6bbf, #2980b9) !important;
  box-shadow: 0 4px 0 #0d3f7a !important;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem) !important;
}
.p1 .duel-note-btn.acc-btn-flat,
.p2 .duel-note-btn.acc-btn-flat {
  background: linear-gradient(135deg, #7b2d8b, #9b59b6) !important;
  box-shadow: 0 4px 0 #4a1a57 !important;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem) !important;
}

/* 피드백 (2인 전용, 각 패널 오버레이) */
.duel-feedback {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none;
  border-radius: inherit;
}
.duel-feedback.show { display: flex; }
.duel-feedback-box {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  padding: 16px 30px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 6px 30px rgba(0,0,0,.5);
  animation: popIn .18s ease;
}
.duel-feedback-box.correct { background: #27ae60; color: #fff; }
.duel-feedback-box.wrong   { background: #c0392b; color: #fff; }

/* 각 패널은 position:relative 필요 */
.player-panel-inner {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════ 대전 결과 화면 ══════════ */
#phase-duel-result {
  display: none;
  width: 100%;
  flex: 1;
  min-height: 0;
  max-width: 100vw;
  flex-direction: column;
  align-items: stretch;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.duel-result-cols {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.duel-result-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4vh 2vw;
  gap: 2.2vh;
  overflow-y: auto;
  min-height: 0;
}

.duel-result-panel.p1-bg { background: linear-gradient(160deg, #1a3a6b, #0d2040); }
.duel-result-panel.p2-bg { background: linear-gradient(160deg, #6b1a1a, #400d0d); }

.result-badge {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  padding: 1vh 3vw;
  border-radius: 16px;
  text-align: center;
  letter-spacing: 0.1em;
}
.badge-win  { background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff; box-shadow: 0 4px 20px rgba(243,156,18,.5); }
.badge-lose { background: rgba(255,255,255,0.1); color: rgba(255,255,255,.6); border: 2px solid rgba(255,255,255,.2); }

.result-player-name {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.54rem, 3.3vw, 2.64rem);
  color: #fff;
}

.result-score-big {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(1.8rem, 4vw, 3.2rem);
  color: #fff;
}

.result-stats {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 1.8vh 2vw;
  width: 100%;
  max-width: 360px;
}
.result-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1vh 0;
  border-bottom: 1px solid rgba(255,255,255,.12);
  font-size: clamp(1.35rem, 2.4vw, 1.8rem);
}
.result-stat-row:last-child { border-bottom: none; }
.stat-label { color: rgba(255,255,255,.7); }
.stat-value { color: #fff; font-weight: bold; }

.duel-result-footer {
  display: flex;
  justify-content: center;
  padding: 2vh;
  background: #111;
  flex-shrink: 0;
}
.home-btn {
  font-family: 'Jua', sans-serif;
  font-size: clamp(1.1rem, 2vw, 1.6rem);
  padding: 1.4vh 4vw;
  background: linear-gradient(135deg, #555, #333);
  color: #fff; border: none; border-radius: 12px;
  cursor: pointer;
  transition: transform .1s;
}
.home-btn:active { transform: scale(.97); }

/* ══════════ 1인용 결과 ══════════ */
#phase-result {
  display:none; flex-direction:column; align-items:center; gap:16px;
  width:100%; max-width: min(860px, 98vw);
  flex: 1; min-height: 0;
  padding: 1vh 8px;
  overflow-y: auto;
  justify-content: center;
}
.result-card {
  background:var(--cream); color:#222; border-radius:16px;
  padding: 3vh 2vw; box-shadow:var(--shadow);
  width:100%; text-align:center;
}
.result-emoji { font-size: clamp(3rem, 5vw, 5rem); margin-bottom:8px; }
.result-msg {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(1.5rem, 2.5vw, 2.4rem); color:#c0392b; margin-bottom:10px;
}
.result-score { font-size: clamp(1rem, 1.6vw, 1.5rem); color:#555; margin-bottom:4px; }
.result-big {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(2.5rem, 4vw, 3.9rem); color:#1a1a1a;
}
.result-btns { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
.result-btn {
  font-family:'Jua',sans-serif;
  font-size: clamp(1rem, 1.6vw, 1.4rem);
  padding: 1.2vh 3vw; border:none; border-radius:12px;
  cursor:pointer; transition:transform .1s;
}
.result-btn:active { transform:scale(.97); }
.btn-home { background:#555; color:#fff; }
.btn-retry { background:var(--red); color:#fff; }
</style>
</head>
<body>

<!-- ══ 1단계: 설정 ══ -->
<div id="phase-settings">
  <div style="display:flex; align-items:baseline; justify-content:center; gap:10px;">
    <h1>계이름 <span>마스터</span> 🎵</h1>
    <span style="font-family:'Jua',sans-serif; color:#bbb; font-size:0.85rem; white-space:nowrap;">v3.7.2</span>
  </div>

  <div class="settings-cols">
    <!-- 왼쪽 -->
    <div class="settings-col">
      <div class="setting-row">
        <div class="setting-label">연습할 계이름</div>
        <div class="btn-group-row">
          <button class="opt-btn active" id="range-high" onclick="setSetting('range','high')">높은 음자리표</button>
          <button class="opt-btn"        id="range-low"  onclick="setSetting('range','low')">낮은 음자리표</button>
        </div>
      </div>
      <div class="setting-row" style="margin-top:10px;">
        <div class="setting-label">계이름의 범위</div>
        <div class="btn-group-row">
          <button class="opt-btn active" id="oct-1" onclick="setSetting('oct','1')">한 옥타브</button>
          <button class="opt-btn"        id="oct-2" onclick="setSetting('oct','2')">두 옥타브</button>
        </div>
      </div>
      <div class="setting-row" style="margin-top:10px;">
        <div class="setting-label">정답 입력 방식</div>
        <div class="btn-group-row">
          <button class="opt-btn"        id="ans-piano"  onclick="setSetting('answerMode','piano')">피아노 건반</button>
          <button class="opt-btn active" id="ans-button" onclick="setSetting('answerMode','button')">큰 버튼</button>
        </div>
      </div>
      <div class="setting-row" style="margin-top:10px;">
        <div class="setting-label">🎮 플레이 인원</div>
        <div class="btn-group-row">
          <button class="opt-btn active" id="mode-1p" onclick="setMode(1)">👤 1인 연습</button>
          <button class="opt-btn"        id="mode-2p" onclick="setMode(2)">👥 2인 대전</button>
        </div>
      </div>
      <div class="mode-notice" id="mode-notice">
        ⚠️ 2인 대전은 <strong>큰 버튼</strong> 모드로만 진행됩니다.
      </div>
    </div>

    <!-- 오른쪽 -->
    <div class="settings-col">
      <div class="setting-row">
        <div class="setting-label" id="qcount-label">문제의 수</div>
        <div class="btn-group-row" id="q-row">
          <button class="opt-btn active" id="q-10" onclick="setSetting('qcount','10')">10문제</button>
          <button class="opt-btn"        id="q-15" onclick="setSetting('qcount','15')">15문제</button>
          <button class="opt-btn"        id="q-20" onclick="setSetting('qcount','20')">20문제</button>
        </div>
        <div id="duel-qcount-desc" style="display:none; font-size:clamp(0.82rem,1.3vw,1.05rem); color:#7b2d2d; padding: 6px 10px; background:#fdeaea; border-radius:8px; border-left:3px solid #c0392b; width:fit-content;">
          선택한 수만큼 먼저 맞히는 사람이 이기는 게임입니다.
        </div>
      </div>
      <div class="setting-row" id="difficulty-row" style="margin-top:10px;">
        <div style="display:flex; align-items:baseline; gap:8px;">
          <div class="setting-label">난이도</div>
          <span id="diff-cur-label" style="font-family:'Jua',sans-serif; font-size:1rem; color:#c0392b; font-weight:bold;">(진지)</span>
        </div>
        <div class="diff-slider-wrap">
          <div class="diff-slider-track">
            <div class="diff-slider-line"></div>
            <div class="diff-slider-fill" id="diff-fill"></div>
            <input class="diff-slider" type="range" id="diff-slider" min="2" max="8" step="1" value="4"
              oninput="onDiffSlider(this.value)">
          </div>
          <div class="diff-ticks" id="diff-ticks"></div>
        </div>
      </div>
      <div class="setting-row" style="margin-top:10px;">
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="setting-label">🔊 소리</div>
          <label class="toggle-switch">
            <input type="checkbox" id="vol-toggle" checked onchange="setVolume(this.checked)">
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
      <div class="setting-row" style="margin-top:10px;">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <div class="setting-label">조성</div>
          <div class="btn-group-row" style="flex-wrap:nowrap;">
            <button class="opt-btn active" id="key-C" onclick="toggleKey('C')">다장조</button>
            <button class="opt-btn"        id="key-G" onclick="toggleKey('G')">사장조</button>
            <button class="opt-btn"        id="key-F" onclick="toggleKey('F')">바장조</button>
          </div>
        </div>
      </div>
      <button class="start-btn" onclick="startGame()">🎹 시작!</button>
    </div>
  </div>

</div>

<!-- ══ 이동도 안내 화면 ══ -->
<div id="phase-acc-intro" style="display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; margin:auto; padding:20px;">
  <div style="background:#edfaf7; border-radius:20px; padding:32px 36px; box-shadow:0 4px 24px rgba(0,0,0,.18); width:fit-content; max-width:min(660px,94vw); color:#222; text-align:center;">
    <div id="acc-intro-lines" style="font-family:'Jua',sans-serif; font-size:1.45rem; color:#2d5a4e; line-height:2.0; margin-bottom:28px; white-space:nowrap;"></div>
    <button onclick="proceedFromAccIntro()" style="font-family:'Jua',sans-serif; font-size:1.3rem; padding:13px 44px; background:linear-gradient(135deg,#c0392b,#e74c3c); color:#fff; border:none; border-radius:14px; cursor:pointer; box-shadow:0 4px 14px rgba(192,57,43,.4);">확인</button>
  </div>
</div>

<!-- ══ 2단계: 1인용 시험 ══ -->
<div id="phase-quiz">
  <div style="display:flex;align-items:center;width:100%;max-width:min(860px,98vw);gap:8px;">
    <button onclick="goHome()" style="font-family:'Jua',sans-serif;font-size:clamp(1.08rem,1.8vw,1.56rem);padding:8px 20px;background:#888;color:#fff;border:none;border-radius:12px;cursor:pointer;">← 이전</button>
    <div style="flex:1;"></div>
    <button id="btn-pause" onclick="togglePause()" style="font-family:'Jua',sans-serif;font-size:clamp(1.08rem,1.8vw,1.56rem);padding:8px 20px;background:#e67e22;color:#fff;border:none;border-radius:12px;cursor:pointer;">⏸ 일시정지</button>
  </div>
  <div class="quiz-top">
    <div class="question-card">
      <div class="q-label">계이름은? <span id="q-progress" class="q-num"></span></div>
      <svg id="quiz-staff" width="342" height="189" viewBox="0 0 360 210"></svg>
    </div>
    <div class="timer-card">
      <div class="timer-label">남은 시간</div>
      <div id="timer-num">3</div>
      <div id="timer-unit">초</div>
    </div>
  </div>

  <div id="answer-piano" class="piano-case">
    <div class="piano-key-area"><div id="piano-keyboard"></div></div>
  </div>
  <div id="answer-buttons" style="display:none; width:100%; max-width:min(860px,98vw);">
    <div class="note-btns-wrap" id="note-btns-wrap">
      <button class="note-btn" onclick="onNoteBtn('도')">도</button>
      <button class="note-btn" onclick="onNoteBtn('레')">레</button>
      <button class="note-btn" onclick="onNoteBtn('미')">미</button>
      <button class="note-btn" onclick="onNoteBtn('파')">파</button>
      <button class="note-btn" onclick="onNoteBtn('솔')">솔</button>
      <button class="note-btn" onclick="onNoteBtn('라')">라</button>
      <button class="note-btn" onclick="onNoteBtn('시')">시</button>
    </div>
  </div>
</div>

<!-- ══ 2인 대전 화면 ══ -->
<div id="phase-duel">
  <div class="duel-header">
    <button onclick="goHome()" style="font-family:'Jua',sans-serif;font-size:clamp(0.85rem,1.4vw,1.1rem);padding:6px 16px;background:#555;color:#fff;border:none;border-radius:10px;cursor:pointer;">← 처음으로</button>
    <div style="font-family:'Black Han Sans',sans-serif;font-size:clamp(1.8rem,3.6vw,2.8rem);color:#fff;flex:1;text-align:center;">🎵 계이름 겨루기 🎵</div>
    <div style="width:80px;"></div><!-- spacer -->
  </div>
  <div class="duel-players">

    <!-- 플레이어 1 (왼쪽) -->
    <div class="player-panel p1">
      <div class="player-header">
        <div class="player-name">👤 1번 학생</div>
      </div>
      <div class="score-display">
        <div id="p1-score" class="score-current">0</div>
        <div id="p1-score-total" class="score-total">/ 10</div>
      </div>
      <div class="player-panel-inner" id="p1-inner">
        <div class="duel-staff-wrap" id="p1-staff-wrap">
          <div class="duel-q-label" id="p1-q-label">문제 준비 중...</div>
          <svg id="p1-staff" width="340" height="189" viewBox="0 0 360 210"></svg>
        </div>
        <div class="duel-btns-wrap">
          <div class="duel-note-grid" id="p1-btns"></div>
        </div>
        <div class="duel-feedback" id="p1-feedback">
          <div class="duel-feedback-box" id="p1-feedback-box"></div>
        </div>
      </div>
    </div>

    <!-- 플레이어 2 (오른쪽) -->
    <div class="player-panel p2">
      <div class="player-header">
        <div class="player-name">👤 2번 학생</div>
      </div>
      <div class="score-display">
        <div id="p2-score" class="score-current">0</div>
        <div id="p2-score-total" class="score-total">/ 10</div>
      </div>
      <div class="player-panel-inner" id="p2-inner">
        <div class="duel-staff-wrap" id="p2-staff-wrap">
          <div class="duel-q-label" id="p2-q-label">문제 준비 중...</div>
          <svg id="p2-staff" width="340" height="189" viewBox="0 0 360 210"></svg>
        </div>
        <div class="duel-btns-wrap">
          <div class="duel-note-grid" id="p2-btns"></div>
        </div>
        <div class="duel-feedback" id="p2-feedback">
          <div class="duel-feedback-box" id="p2-feedback-box"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══ 2인 대전 결과 ══ -->
<div id="phase-duel-result">
  <div class="duel-result-cols">
    <!-- P1 결과 -->
    <div class="duel-result-panel p1-bg" id="p1-result-panel">
      <div class="result-badge" id="p1-result-badge">🏆 승리!</div>
      <div class="result-player-name">1번 학생</div>
      <div class="result-score-big" id="p1-result-score"></div>
      <div class="result-stats" id="p1-result-stats"></div>
    </div>

<script>
// ══ 오디오 ══
let actx = null, mGain = null;
function ensureAudioCtx(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  mGain = actx.createGain(); mGain.gain.value=0.6; mGain.connect(actx.destination);
}
function unlockAudio(){
  ensureAudioCtx();
  if(actx.state==='suspended') actx.resume();
  try {
    const buf=actx.createBuffer(1,1,22050); const src=actx.createBufferSource();
    src.buffer=buf; src.connect(actx.destination); src.start(0);
  } catch(e){}
}
document.addEventListener('visibilitychange', ()=>{ if(actx && !document.hidden && actx.state==='suspended') actx.resume(); });
function playNote(freq){
  if(!soundOn) return;
  ensureAudioCtx();
  if(actx.state==='suspended') actx.resume();
  const now=actx.currentTime, g=actx.createGain(), f=actx.createBiquadFilter();
  const o1=actx.createOscillator(); o1.type='triangle'; o1.frequency.value=freq;
  const o2=actx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
  const g2=actx.createGain(); g2.gain.value=0.2;
  const oh=actx.createOscillator(); oh.type='sine'; oh.frequency.value=freq*3;
  const gh=actx.createGain(); gh.gain.setValueAtTime(0.6,now); gh.gain.exponentialRampToValueAtTime(0.0001,now+0.1);
  o1.connect(f); o2.connect(g2).connect(f); oh.connect(gh).connect(f);
  f.type='lowpass'; f.frequency.setValueAtTime(4000,now); f.frequency.exponentialRampToValueAtTime(800,now+1);
  g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.4,now+0.005); g.gain.exponentialRampToValueAtTime(0.01,now+2);
  f.connect(g).connect(mGain);
  [o1,o2,oh].forEach(o=>{ o.start(now); try{o.stop(now+2.5);}catch(e){} });
}

// ══ 설정 상태 ══
const cfg = { range:'high', oct:'1', qcount:'10', diff:'normal', answerMode:'button', mode: 1, keys: new Set(['C']) };
const diffTime = {8:'beginner', 7:'easy7', 6:'easy6', 5:'easy5', 4:'normal', 3:'hard', 2:'vhard'};
const diffLabel = {8:'(초보)', 7:'(쉬움)', 6:'(관대)', 5:'(보통)', 4:'(진지)', 3:'(엄격)', 2:'(고수)'};
let soundOn = true;

// 슬라이더 초기화
function initDiffSlider(){
  const ticks = document.getElementById('diff-ticks');
  ticks.innerHTML = '';
  // 왼쪽=8초(쉬움), 오른쪽=2초(어려움) → 눈금 8→2
  for(let s=8; s>=2; s--){
    const d = document.createElement('div');
    d.className = 'diff-tick' + (s===4 ? ' active-tick' : '');
    d.id = 'tick-'+s;
    d.textContent = s+'초';
    ticks.appendChild(d);
  }
  updateDiffFill(4);
  document.getElementById('diff-slider').style.setProperty('--thumb-color', '#f39c12');
}

function updateDiffFill(val){
  // 슬라이더는 scaleX(-1) 반전이라 val=8이면 시각적으로 왼쪽
  // 8초(왼쪽)=fill 0%, 2초(오른쪽)=fill 100%
  const pct = (8 - val) / (8 - 2) * 100;
  document.getElementById('diff-fill').style.width = pct + '%';
}

function onDiffSlider(val){
  val = parseInt(val);
  cfg.timeLimit = val;

  // thumb 색: 8초=녹색 ~ 2초=빨강 (fill 그라데이션과 동일 구간)
  const thumbColors = {8:'#27ae60', 7:'#5cb85c', 6:'#a8d520', 5:'#f0c030', 4:'#f39c12', 3:'#e74c3c', 2:'#c0392b'};
  document.getElementById('diff-slider').style.setProperty('--thumb-color', thumbColors[val]);

  // 틱 강조
  for(let s=2; s<=8; s++){
    const t = document.getElementById('tick-'+s);
    if(t) t.className = 'diff-tick' + (s===val ? ' active-tick' : '');
  }
  document.getElementById('diff-cur-label').textContent = diffLabel[val];
  updateDiffFill(val);
  if(val===8) cfg.diff='beginner';
  else if(val===4) cfg.diff='normal';
  else if(val<=3) cfg.diff='hard';
  else cfg.diff='normal';
}

function setVolume(on){
  soundOn = on;
  if(mGain) mGain.gain.value = on ? 0.6 : 0;
  const toggle = document.getElementById('vol-toggle');
  if(toggle) toggle.checked = on;
}

function toggleKey(key){
  // 최소 1개는 선택 유지
  if(cfg.keys.has(key) && cfg.keys.size === 1) return;
  if(cfg.keys.has(key)) cfg.keys.delete(key);
  else cfg.keys.add(key);
  ['C','G','F'].forEach(k=>{
    document.getElementById('key-'+k).classList.toggle('active', cfg.keys.has(k));
  });
}

// 짜잔 효과음: C장조 으뜸화음 아르페지오 + 찰랑이는 여운
function playFanfare(){
  if(!soundOn) return;
  ensureAudioCtx();
  if(actx.state==='suspended') actx.resume();
  const now = actx.currentTime;
  // 도(C4) 미(E4) 솔(G4) 도(C5) 순서로 아르페지오, 이후 화음 지속
  const notes = [
    {f:261.63, t:0.00},
    {f:329.63, t:0.10},
    {f:392.00, t:0.20},
    {f:523.25, t:0.30},
  ];
  notes.forEach(({f, t})=>{
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, now+t);
    g.gain.linearRampToValueAtTime(0.35, now+t+0.04);
    g.gain.exponentialRampToValueAtTime(0.001, now+t+2.2);
    o.connect(g).connect(mGain);
    o.start(now+t);
    o.stop(now+t+2.5);
  });
  // 반짝이는 고음 장식
  const shimmer = actx.createOscillator();
  const sg = actx.createGain();
  shimmer.type = 'sine';
  shimmer.frequency.value = 1046.5; // C6
  sg.gain.setValueAtTime(0.0001, now+0.32);
  sg.gain.linearRampToValueAtTime(0.18, now+0.36);
  sg.gain.exponentialRampToValueAtTime(0.001, now+1.2);
  shimmer.connect(sg).connect(mGain);
  shimmer.start(now+0.32);
  shimmer.stop(now+1.5);
}

function setSetting(key, val){
  cfg[key] = val;
  const prefixes = {range:'range-', oct:'oct-', qcount:'q-', diff:'diff-', answerMode:'ans-'};
  document.querySelectorAll(`[id^="${prefixes[key]}"]`).forEach(b=>b.classList.remove('active'));
  const ids = {
    range: {high:'range-high', low:'range-low'},
    oct:   {'1':'oct-1', '2':'oct-2'},
    qcount:{'10':'q-10','15':'q-15','20':'q-20'},
    diff:  {beginner:'diff-beginner',easy:'diff-easy',normal:'diff-normal',hard:'diff-hard'},
    answerMode: {piano:'ans-piano', button:'ans-button'},
  };
  document.getElementById(ids[key][val]).classList.add('active');
}

function setMode(m){
  cfg.mode = m;
  document.getElementById('mode-1p').classList.toggle('active', m===1);
  document.getElementById('mode-2p').classList.toggle('active', m===2);
  const notice = document.getElementById('mode-notice');
  const diffRow = document.getElementById('difficulty-row');
  const qLabel = document.getElementById('qcount-label');
  if(m===2){
    notice.classList.add('show');
    // 피아노 건반 강제 비활성
    document.getElementById('ans-piano').classList.add('disabled-look');
    document.getElementById('ans-piano').disabled = true;
    // 큰 버튼 강제 선택
    if(cfg.answerMode === 'piano'){
      setSetting('answerMode','button');
    }
    // 난이도 숨김, 문제 수 라벨 변경
    diffRow.style.display = 'none';
    qLabel.textContent = '맞혀야 하는 문제의 수';
    document.getElementById('duel-qcount-desc').style.display = '';
  } else {
    notice.classList.remove('show');
    document.getElementById('ans-piano').classList.remove('disabled-look');
    document.getElementById('ans-piano').disabled = false;
    diffRow.style.display = '';
    qLabel.textContent = '문제의 수';
    document.getElementById('duel-qcount-desc').style.display = 'none';
  }
}

function buildQuestionPool(){
  let pool=[];
  if(cfg.range==='high'){
    if(cfg.keys.has('C')){
      const base = NOTES_TREBLE.filter(n=> cfg.oct!=='2' ? ['C4','D4','E4','F4','G4','A4','B4','C5'].includes(n.n) : true);
      pool = pool.concat(base);
    }
    if(cfg.keys.has('G')){
      const g = cfg.oct!=='2' ? NOTES_TREBLE_GMAJ.filter(n=>['C4','D4','E4','F4','G4','A4','B4','C5'].includes(n.n)) : NOTES_TREBLE_GMAJ;
      pool = pool.concat(g);
    }
    if(cfg.keys.has('F')){
      const f = cfg.oct!=='2' ? NOTES_TREBLE_FMAJ.filter(n=>['C4','D4','E4','F4','G4','A4','B4','C5'].includes(n.n)) : NOTES_TREBLE_FMAJ;
      pool = pool.concat(f);
    }
  }
  if(cfg.range==='low'){
    if(cfg.keys.has('C')){
      const base = NOTES_BASS.filter(n=> cfg.oct!=='2' ? ['C3','D3','E3','F3','G3','A3','B3','C4'].includes(n.n) : true);
      pool = pool.concat(base);
    }
    if(cfg.keys.has('G')) pool = pool.concat(NOTES_BASS_GMAJ);
    if(cfg.keys.has('F')) pool = pool.concat(NOTES_BASS_FMAJ);
  }
  return pool;
}

function makeQuestions(total){
  const keys = [...cfg.keys];
  const n = keys.length;

  // 1) 조성별 할당 수 (균등 배분, 나머지는 앞 조성부터)
  const baseCount = Math.floor(total / n);
  const remainder = total % n;
  const counts = keys.map((k, i) => baseCount + (i < remainder ? 1 : 0));

  // 2) 조성별 풀
  function poolFor(key){
    const isHigh = cfg.range === 'high';
    const isTwo  = cfg.oct === '2';
    const o1H = nd => ['C4','D4','E4','F4','G4','A4','B4','C5'].includes(nd.n);
    const o1L = nd => ['C3','D3','E3','F3','G3','A3','B3','C4'].includes(nd.n);
    const flt  = isHigh ? o1H : o1L;
    if(isHigh){
      if(key==='C') return isTwo ? [...NOTES_TREBLE]       : NOTES_TREBLE.filter(flt);
      if(key==='G') return isTwo ? [...NOTES_TREBLE_GMAJ]  : NOTES_TREBLE_GMAJ.filter(flt);
      if(key==='F') return isTwo ? [...NOTES_TREBLE_FMAJ]  : NOTES_TREBLE_FMAJ.filter(flt);
    } else {
      if(key==='C') return isTwo ? [...NOTES_BASS]         : NOTES_BASS.filter(flt);
      if(key==='G') return isTwo ? [...NOTES_BASS_GMAJ]    : NOTES_BASS_GMAJ.filter(flt);
      if(key==='F') return isTwo ? [...NOTES_BASS_FMAJ]    : NOTES_BASS_FMAJ.filter(flt);
    }
    return [];
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  // 3) 조성별 청크 생성 (G/F는 임시표 최소 1개 보장)
  function makeChunk(key, cnt){
    const pool    = poolFor(key);
    if(!pool.length) return [];
    const accPool  = pool.filter(nd => nd.acc);
    let chunk = [];
    if((key==='G'||key==='F') && accPool.length>0 && cnt>=1){
      chunk.push(accPool[Math.floor(Math.random()*accPool.length)]);
      cnt--;
    }
    for(let i=0;i<cnt;i++) chunk.push(pool[Math.floor(Math.random()*pool.length)]);
    return shuffle(chunk);
  }

  // 4) 청크 합치고 셔플 후 연속 중복 방지
  let all = [];
  keys.forEach((key,i) => { all = all.concat(makeChunk(key, counts[i])); });
  shuffle(all);
  for(let i=1;i<all.length;i++){
    if(all[i].n===all[i-1].n){
      for(let j=i+1;j<all.length;j++){
        if(all[j].n!==all[i-1].n){ [all[i],all[j]]=[all[j],all[i]]; break; }
      }
    }
  }
  return all;
}

let questions=[], qIdx=0, score=0, timeLeft=0, timerInterval=null, canAnswer=true;
let quizActive=false, showQuestionTimeout=null, isPaused=false, usedPause=false;

function startQuiz(){
  const total = parseInt(cfg.qcount);
  questions = makeQuestions(total);
  qIdx=0; score=0; canAnswer=true; usedPause=false; quizActive=true; isPaused=false;

  const isHigh = cfg.range==='high';
  let kbMin, kbMax;
  if(isHigh){ kbMin='C4'; kbMax=cfg.oct==='2'?'B5':'C5'; }
  else       { kbMin=cfg.oct==='2'?'C2':'C3'; kbMax='C4'; }

  document.getElementById('phase-settings').style.display='none';
  document.getElementById('phase-result').style.display='none';
  document.getElementById('phase-quiz').style.display='flex';

  if(cfg.answerMode==='piano'){
    document.getElementById('answer-piano').style.display='';
    document.getElementById('answer-buttons').style.display='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ buildKb(kbMin, kbMax); }));
  } else {
    document.getElementById('answer-piano').style.display='none';
    document.getElementById('answer-buttons').style.display='';
  }
  showQuestion();
}

function showQuestion(){
  if(!quizActive) return;
  if(qIdx>=questions.length){ endQuiz(); return; }
  canAnswer=false;
  clearInterval(timerInterval);
  const svg=document.getElementById('quiz-staff');
  svg.innerHTML='';
  document.getElementById('q-progress').textContent='';
  clearTimeout(showQuestionTimeout);
  showQuestionTimeout = setTimeout(()=>{
    if(!quizActive) return;
    if(qIdx>=questions.length){ endQuiz(); return; }
    canAnswer=true;
    const nd=questions[qIdx];
    document.getElementById('q-progress').textContent=`(${qIdx+1}/${questions.length})`;
    drawStaff(nd, 'quiz-staff');
    // 버튼 모드일 때 임시표 버튼 포함해서 다시 그리기
    if(cfg.answerMode==='button') renderNoteBtns(nd);
    document.querySelectorAll('.key').forEach(k=>k.classList.remove('ref-do'));
    // 사장조/바장조가 하나라도 선택된 피아노 모드: 노란 기준 건반 표시 안 함
    const showRefKey = !(cfg.answerMode === 'piano' && (cfg.keys.has('G') || cfg.keys.has('F')));
    if(showRefKey){
      const refKeyNote = (nd.clef==='treble') ? 'C4' : 'C3';
      const refKeyEl = document.querySelector(`[data-note="${refKeyNote}"]`);
      if(refKeyEl) refKeyEl.classList.add('ref-do');
    }
    timeLeft = parseInt(document.getElementById('diff-slider').value);
    // 사장조/바장조 + 큰 버튼 모드는 이동도법이므로 시간 1.75배 완화
    if(cfg.answerMode === 'button' && nd.keySig && (nd.keySig === 'G' || nd.keySig === 'F')){
      timeLeft = Math.round(timeLeft * 1.75);
    }
    document.getElementById('timer-num').textContent=timeLeft;
    timerInterval = setInterval(()=>{
      if(isPaused) return;
      timeLeft--;
      document.getElementById('timer-num').textContent=timeLeft;
      if(timeLeft<=0){ clearInterval(timerInterval); timeUp(); }
    },1000);
  },200);
}

function timeUp(){
  if(!canAnswer) return;
  canAnswer=false;
  accPending=false; highlightAccBtn(false);
  const nd=questions[qIdx];
  const correctLabel = (cfg.answerMode==='button' && nd.movableDo) ? nd.movableDo : (nd.acc==='sharp' ? '♯' : nd.acc==='flat' ? '♭' : '') + nd.k;
  showFeedback(false,`시간 초과! 정답은 '${correctLabel}'입니다.`);
  setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1800);
}

let accPending = false; // 샵/플랫 버튼이 눌린 상태인지

function renderNoteBtns(nd){
  const wrap = document.getElementById('note-btns-wrap');
  if(!wrap) return;
  wrap.innerHTML = '';
  const baseLabels = ['도','레','미','파','솔','라','시'];
  baseLabels.forEach(label=>{
    const btn = document.createElement('button');
    btn.className = 'note-btn';
    btn.textContent = label;
    btn.onclick = ()=>onNoteBtn(label);
    wrap.appendChild(btn);
  });
  // 큰 버튼 모드는 이동도법이므로 임시표 버튼 없음
  accPending = false;
  highlightAccBtn(false);
}

function onAccBtn(accType){
  unlockAudio();
  if(!canAnswer) return;
  accPending = true;
  highlightAccBtn(true);
}

function highlightAccBtn(on){
  const btns = document.querySelectorAll('.acc-btn-sharp, .acc-btn-flat');
  btns.forEach(b=> b.classList.toggle('acc-active', on));
}

function onNoteBtn(noteName){
  unlockAudio();
  if(!canAnswer) return;
  if(document.getElementById('phase-quiz').style.display==='none') return;
  const nd = questions[qIdx];

  // 버튼 모드: 이동도법으로 채점 (keySig가 있으면 movableDo, 없으면 k)
  const correctLabel = (nd.movableDo) ? nd.movableDo : nd.k;

  canAnswer=false;
  clearInterval(timerInterval);
  playNote(nd.f);
  if(noteName === correctLabel){
    score++;
    showFeedback(true,'정답! ✓');
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1000);
  } else {
    showFeedback(false,`땡! 정답은 '${correctLabel}'입니다.`);
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1800);
  }
}

function onKey(keyNote){
  if(!canAnswer) return;
  if(document.getElementById('phase-quiz').style.display==='none'){ playNote(keyNote.f); return; }
  playNote(keyNote.f);
  canAnswer=false;
  clearInterval(timerInterval);
  const nd=questions[qIdx];
  // 건반 n은 'F#4','Bb4' 형식, 음표 n은 'F4','B4' 형식
  // 옥타브 번호 + 임시표 여부 + 베이스 음이름으로 비교
  const baseOfKey = keyNote.n.replace(/[#b]/g,''); // 'F#4'→'F4', 'Bb4'→'B4'
  const correct = (baseOfKey === nd.n) && ((keyNote.acc||null) === (nd.acc||null));
  if(correct){
    score++;
    showFeedback(true,'정답! ✓');
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1000);
  } else {
    const accLabel = nd.acc==='sharp' ? '♯' : nd.acc==='flat' ? '♭' : '';
    showFeedback(false,`땡! 정답은 '${accLabel}${nd.k}'입니다.`);
    setTimeout(()=>{ hideFeedback(); qIdx++; showQuestion(); },1800);
  }
}

function showFeedback(ok, msg){
  const box=document.getElementById('feedback-box');
  box.textContent=msg; box.className=ok?'correct':'wrong';
  document.getElementById('feedback-overlay').style.display='flex';
}
function hideFeedback(){
  document.getElementById('feedback-overlay').style.display='none';
}

function endQuiz(){
  clearInterval(timerInterval);
  document.getElementById('phase-quiz').style.display='none';
  document.getElementById('phase-result').style.display='flex';
  const total=questions.length, pct=total>0?Math.round(score/total*100):0;
  let emoji, msg;
  if(pct<=50) { emoji='😓'; msg='갈 길이 멀군요. 파이팅!'; }
  else if(pct<=70) { emoji='🙂'; msg='연습이 조금 더 필요합니다.'; }
  else if(pct<=80) { emoji='😊'; msg='그럭저럭 읽을 수 있겠군요.'; }
  else if(pct<=90) { emoji='😄'; msg='나쁘지 않아요.'; }
  else { emoji='🏆'; msg='훌륭합니다!'; }
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-msg').textContent=msg;
  document.getElementById('result-score').textContent=`${total}문제 중 ${score}개 정답`;
  document.getElementById('result-pct').textContent=`${pct}%`;
  const rangeLabel = cfg.range==='high' ? '높은 음자리표' : '낮은 음자리표';
  const octLabel = cfg.oct==='1' ? '한 옥타브' : '두 옥타브';
  const ansLabel = cfg.answerMode==='piano' ? '피아노 건반' : '큰 버튼';
  const pauseLabel = usedPause ? ' · ⏸ 일시정지 사용함' : '';
  document.getElementById('result-summary').textContent=`${rangeLabel} · ${octLabel} · ${ansLabel}${pauseLabel}`;
}

function togglePause(){
  if(isPaused){
    isPaused=false;
    document.getElementById('btn-pause').textContent='⏸ 일시정지';
    document.getElementById('btn-pause').style.background='#e67e22';
    clearInterval(timerInterval);
    if(timeLeft>0){
      timerInterval = setInterval(()=>{
        if(isPaused) return;
        timeLeft--;
        document.getElementById('timer-num').textContent=timeLeft;
        if(timeLeft<=0){ clearInterval(timerInterval); timeUp(); }
      },1000);
    }
    canAnswer=true;
  } else {
    isPaused=true; usedPause=true;
    clearInterval(timerInterval); canAnswer=false;
    document.getElementById('btn-pause').textContent='▶ 이어서 하기';
    document.getElementById('btn-pause').style.background='#27ae60';
  }
}

function retryQuiz(){
  clearInterval(timerInterval); clearTimeout(showQuestionTimeout);
  quizActive=false; isPaused=false; usedPause=false; canAnswer=false;
  questions=[]; qIdx=0; score=0; timeLeft=0;
  hideFeedback();
  document.getElementById('phase-result').style.display='none';
  startQuiz();
}

  document.getElementById(labelId).textContent='';

  // 버튼 비활성화
  setDuelBtnsEnabled(pi, false);

  clearTimeout(p.timeout);
  p.timeout = setTimeout(()=>{
    if(duel.over) return;
    const nd = p.questions[p.qIdx];
    document.getElementById(labelId).textContent=`문제 ${p.qIdx+1}`;
    drawStaff(nd, svgId);
    // 임시표 포함해서 버튼 재생성
    buildDuelButtons(pi, nd);
    p.accPending = false;
    p.canAnswer = true;
    p.startTimes.push(Date.now());
    setDuelBtnsEnabled(pi, true);
  }, 180);
}

function setDuelBtnsEnabled(pi, enabled){
  const el = document.getElementById(`p${pi+1}-btns`);
  el.querySelectorAll('.duel-note-btn').forEach(b=>{ b.disabled=!enabled; });
}

function duelHighlightAcc(pi, on){
  const el = document.getElementById(`p${pi+1}-btns`);
  el.querySelectorAll('.acc-btn-sharp, .acc-btn-flat').forEach(b=>b.classList.toggle('acc-active', on));
}

function duelAccBtn(pi, accType){
  if(duel.over) return;
  const p = duel.p[pi];
  if(!p.canAnswer) return;
  p.accPending = true;
  duelHighlightAcc(pi, true);
}

function duelAnswer(pi, noteName){
  if(duel.over) return;
  const p = duel.p[pi];
  if(!p.canAnswer) return;

  const nd = p.questions[p.qIdx];

  p.accPending = false;
  duelHighlightAcc(pi, false);
  p.canAnswer = false;
  setDuelBtnsEnabled(pi, false);

  playNote(nd.f);
  p.totalAttempts++;
  p.endTimes.push(Date.now());

  // 이동도법으로 채점
  const correctLabel = nd.movableDo ? nd.movableDo : nd.k;
  const correct = (noteName === correctLabel);
  if(correct){
    p.score++;
    document.getElementById(`p${pi+1}-score`).textContent = p.score;
    showDuelFeedback(pi, true, '정답! ✓');

    if(p.score >= duel.targetScore){
      duel.over = true;
      setTimeout(()=>{ endDuel(pi); }, 900);
      return;
    }

    setTimeout(()=>{
      hideDuelFeedback(pi);
      p.qIdx++;
      duelShowQuestion(pi);
    }, 400);
  } else {
    p.wrongCount++;
    showDuelFeedback(pi, false, `땡! '${correctLabel}' 이에요`);
    setTimeout(()=>{
      hideDuelFeedback(pi);
      p.qIdx++;
      duelShowQuestion(pi);
    }, 700);
  }
}

function showDuelFeedback(pi, ok, msg){
  const fb = document.getElementById(`p${pi+1}-feedback`);
  const box = document.getElementById(`p${pi+1}-feedback-box`);
  box.textContent = msg;
  box.className = 'duel-feedback-box ' + (ok ? 'correct' : 'wrong');
  fb.classList.add('show');
}
function hideDuelFeedback(pi){
  document.getElementById(`p${pi+1}-feedback`).classList.remove('show');
}

function endDuel(winnerPi){
  // 다른 플레이어 입력도 막기
  duel.p.forEach((p,i)=>{
    p.canAnswer = false;
    setDuelBtnsEnabled(i, false);
  });

  // 결과 계산
  const loserPi = winnerPi === 0 ? 1 : 0;

  for(let pi=0; pi<2; pi++){
    const p = duel.p[pi];
    const correctCount = p.score;
    const attempts = p.totalAttempts;
    const wrongCount = p.wrongCount;
    const wrongRate = attempts > 0 ? Math.round(wrongCount / attempts * 100) : 0;

    // 평균 반응 시간 계산
    let avgSec = '—';
    const times = p.endTimes;
    const starts = p.startTimes;
    const pairs = Math.min(times.length, starts.length);
    if(pairs > 0){
      let totalMs = 0;
      for(let i=0; i<pairs; i++) totalMs += (times[i] - starts[i]);
      avgSec = (totalMs / pairs / 1000).toFixed(1) + '초';
    }

    // 배지
    const isWinner = (pi === winnerPi);
    document.getElementById(`p${pi+1}-result-badge`).textContent = isWinner ? '🏆 승리!' : '😢 아쉽..';
    document.getElementById(`p${pi+1}-result-badge`).className = 'result-badge ' + (isWinner ? 'badge-win' : 'badge-lose');
    document.getElementById(`p${pi+1}-result-score`).textContent = `${correctCount}문제 정답`;

    // 통계
    const statsEl = document.getElementById(`p${pi+1}-result-stats`);
    statsEl.innerHTML = `
      <div class="result-stat-row">
        <span class="stat-label">맞힌 문제</span>
        <span class="stat-value">${correctCount}개</span>
      </div>
      <div class="result-stat-row">
        <span class="stat-label">총 시도 횟수</span>
        <span class="stat-value">${attempts}번</span>
      </div>
      <div class="result-stat-row">
        <span class="stat-label">오답률</span>
        <span class="stat-value">${wrongRate}%</span>
      </div>
      <div class="result-stat-row">
        <span class="stat-label">문제당 평균 반응속도</span>
        <span class="stat-value">${avgSec}</span>
      </div>
    `;
  }

  setTimeout(()=>{
    document.getElementById('phase-duel').style.display='none';
    document.getElementById('phase-duel-result').style.display='flex';
    playFanfare();
  }, 1000);
}

// ══ 공통: 처음으로 ══
function goHome(){
  clearInterval(timerInterval);
  clearTimeout(showQuestionTimeout);
  timerInterval=null; showQuestionTimeout=null;
  quizActive=false; isPaused=false; usedPause=false; canAnswer=false;
  questions=[]; qIdx=0; score=0; timeLeft=0;
  duel.over=true;
  duel.p.forEach((p,i)=>{ clearTimeout(p.timeout); p.canAnswer=false; setDuelBtnsEnabled(i, false); });
  hideFeedback();
  duel.p.forEach((_,i)=>hideDuelFeedback(i));
  document.querySelectorAll('.key').forEach(k=>k.classList.remove('ref-do'));
  // 버튼 UI 리셋
  const btnP = document.getElementById('btn-pause');
  if(btnP){ btnP.textContent='⏸ 일시정지'; btnP.style.background='#e67e22'; }
  // 결과 초기화
  ['result-emoji','result-msg','result-score','result-pct','result-summary'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent='';
  });
  // 화면 전환
  document.getElementById('phase-quiz').style.display='none';
  document.getElementById('phase-result').style.display='none';
  document.getElementById('phase-duel').style.display='none';
  document.getElementById('phase-duel-result').style.display='none';
  document.getElementById('phase-acc-intro').style.display='none';
  document.getElementById('phase-settings').style.display='flex';
}

// ══ SVG 오선지 그리기 ══
function se(p, tag, attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  p.appendChild(el); return el;
}
const TREBLE_CLEF = '\u{1D11E}';
const BASS_CLEF   = '\u{1D122}';

// ── 임시표/조표 기호 SVG 텍스트로 그리기 (MusicAcc 폰트 - base64 임베드) ──
function drawAccText(svg, char, cx, cy, fontSize, col){
  const el = document.createElementNS('http://www.w3.org/2000/svg','text');
  el.setAttribute('x', cx);
  el.setAttribute('y', cy);
  el.setAttribute('font-family', 'MusicAcc, serif');
  el.setAttribute('font-size', fontSize);
  el.setAttribute('fill', col || '#8b1a1a');
  el.setAttribute('text-anchor', 'middle');
  el.setAttribute('dominant-baseline', 'central');
  el.textContent = char;
  svg.appendChild(el);
}

function drawSharpSVG(svg, cx, cy, sz, col){
  drawAccText(svg, '\u266F', cx, cy, 33*(sz||1), col||'#8b1a1a');
}
function drawFlatSVG(svg, cx, cy, sz, col){
  drawAccText(svg, '\u266D', cx, cy, 36*(sz||1), col||'#8b1a1a');
}

// ── 조표 그리기 ──
function drawKeySig(svg, keySig, isBass, line1y, lineGap, halfGap, startX){
  const col = '#8b1a1a';
  if(keySig==='G'){
    const sigStep = isBass ? 9 : 8;
    if(isBass) drawSharpSVG(svg, startX+9,  line1y - sigStep*halfGap + 14, 1.56, col);
    else       drawSharpSVG(svg, startX+14, line1y - sigStep*halfGap - 16, 1.56, col);
  } else if(keySig==='F'){
    const sigStep = isBass ? 5 : 4;
    if(isBass) drawFlatSVG(svg, startX+5,  line1y - sigStep*halfGap + 17, 1.56, col);
    else       drawFlatSVG(svg, startX+18, line1y - sigStep*halfGap - 10, 1.56, col);
  }
}

function drawStaff(nd, svgId){
  const svg = document.getElementById(svgId);
  svg.innerHTML='';
  const W=360, H=210, line1y=155, lineGap=18, halfGap=9;
  const isBass = nd.clef==='bass';

  se(svg,'rect',{width:W,height:H,fill:'#fdf6e3',rx:8});
  for(let i=0;i<5;i++){
    const y=line1y-i*lineGap;
    se(svg,'line',{x1:10,x2:W-10,y1:y,y2:y,stroke:'#8b3a1a','stroke-width':1.6});
  }
  se(svg,'line',{x1:10,x2:10,y1:line1y-4*lineGap,y2:line1y,stroke:'#8b3a1a','stroke-width':2});
  se(svg,'line',{x1:W-10,x2:W-10,y1:line1y-4*lineGap,y2:line1y,stroke:'#8b3a1a','stroke-width':2.5});
  se(svg,'line',{x1:W-15,x2:W-15,y1:line1y-4*lineGap,y2:line1y,stroke:'#8b3a1a','stroke-width':1.2});

  const clefEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  if(isBass){
    clefEl.setAttribute('x','8'); clefEl.setAttribute('y',String(line1y-lineGap*1.5+25));
    clefEl.setAttribute('font-size','90');
  } else {
    clefEl.setAttribute('x','4'); clefEl.setAttribute('y',String(line1y+lineGap*0.6-10));
    clefEl.setAttribute('font-size','125');
  }
  clefEl.setAttribute('fill','#8b1a1a');
  clefEl.setAttribute('font-family','MusicClef, serif');
  clefEl.textContent = isBass ? BASS_CLEF : TREBLE_CLEF;
  svg.appendChild(clefEl);

  // 조표 그리기 (keySig가 있는 음표일 때, 폰트 의존 없이 SVG 도형으로)
  const keySigX = isBass ? 78 : 64;
  if(nd.keySig) drawKeySig(svg, nd.keySig, isBass, line1y, lineGap, halfGap, keySigX);

  // 음표 x위치: 조표 있으면 약간 오른쪽
  const nx = nd.keySig ? 285 : 270;
  const step=nd.s, ny=line1y-step*halfGap, r=9;

  function drawLedger(st){
    se(svg,'line',{x1:nx-r-6,x2:nx+r+6,y1:line1y-st*halfGap,y2:line1y-st*halfGap,stroke:'#8b3a1a','stroke-width':1.8});
  }
  if(step<=-2){ for(let st=-2;st>=step;st-=2) drawLedger(st); }
  if(step>=10){ for(let st=10;st<=step;st+=2) drawLedger(st); }

  // 기준 노란 음표: 조성의 으뜸음 위치
  // 다장조: 높은=도(s:-2), 낮은=도(s:3)
  // 사장조: 높은=솔(s:2),  낮은=솔(s:0)
  // 바장조: 높은=파(s:1),  낮은=파(s:-1)
  let refStep;
  if(nd.keySig === 'G'){
    refStep = isBass ? 0 : 2;
  } else if(nd.keySig === 'F'){
    refStep = isBass ? -1 : 1;
  } else {
    refStep = isBass ? 3 : -2;
  }
  const refNx   = nd.keySig ? 135 : 120;
  const refNy   = line1y - refStep * halfGap;
  // 사장조/바장조가 하나라도 선택된 피아노 모드: 노란 기준 음표 + 덧줄 표시 안 함
  const showRefNote = !(cfg.answerMode === 'piano' && (cfg.keys.has('G') || cfg.keys.has('F')));
  if(showRefNote){
    if(!isBass && refStep <= -2){
      for(let st=refStep; st<=-2; st+=2){
        se(svg,'line',{x1:refNx-r-6,x2:refNx+r+6,y1:line1y-st*halfGap,y2:line1y-st*halfGap,stroke:'#8b3a1a','stroke-width':1.8});
      }
    }
    se(svg,'ellipse',{cx:refNx,cy:refNy,rx:r+1,ry:r-1,fill:'#f1c40f',stroke:'#e67e22','stroke-width':1.5,transform:`rotate(-15,${refNx},${refNy})`});
  }

  se(svg,'ellipse',{cx:nx,cy:ny,rx:r+1,ry:r-1,fill:'#8b1a1a',transform:`rotate(-15,${nx},${ny})`});
  const stemUp = step<5;
  if(stemUp) se(svg,'line',{x1:nx+r,x2:nx+r,y1:ny,y2:ny-48,stroke:'#8b1a1a','stroke-width':2.5});
  else       se(svg,'line',{x1:nx-r,x2:nx-r,y1:ny,y2:ny+48,stroke:'#8b1a1a','stroke-width':2.5});
}

// ══ 건반 생성 ══
function buildKb(minNote, maxNote){
  const kb = document.getElementById('piano-keyboard');
  kb.innerHTML='';
  const allWhite = PIANO_NOTES.filter(n=>!n.acc);
  const wLocal = allWhite.filter(n=>{
    const noteNum = n.o*12 + 'CDEFGAB'.indexOf(n.n[0]);
    const minNum = parseInt(minNote.slice(-1))*12 + 'CDEFGAB'.indexOf(minNote[0]);
    const maxNum = parseInt(maxNote.slice(-1))*12 + 'CDEFGAB'.indexOf(maxNote[0]);
    return noteNum>=minNum && noteNum<=maxNum;
  });
  const wIdxLocal = {}; wLocal.forEach((n,i)=>wIdxLocal[n.n]=i);
  // 사장조/바장조가 하나라도 선택된 피아노 모드: 건반 계이름 숨김
  const onlyAccKeys = cfg.answerMode === 'piano' && (cfg.keys.has('G') || cfg.keys.has('F'));
  wLocal.forEach((n,i)=>{
    const el=document.createElement('div');
    el.className='key white'; el.dataset.note=n.n;
    const lbl=document.createElement('div');
    lbl.className='key-label'; lbl.textContent=onlyAccKeys ? '' : n.k;
    el.appendChild(lbl);
    el.addEventListener('pointerdown',e=>{ unlockAudio(); e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('pressed'); onKey(n); });
    el.addEventListener('pointerup',  e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    el.addEventListener('pointercancel',e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    kb.appendChild(el);
  });
  kb.style.position='relative';
  PIANO_NOTES.filter(n=>n.acc).forEach(n=>{
    const left=blackAfter[n.n]; if(!left) return;
    const li=wIdxLocal[left]; if(li===undefined) return;
    const el=document.createElement('div');
    el.className='key black'; el.dataset.note=n.n;
    el.style.left=(li*WW+WW-16)+'px'; el.style.top='0';
    el.addEventListener('pointerdown',e=>{ unlockAudio(); e.preventDefault(); el.setPointerCapture(e.pointerId); el.classList.add('pressed'); onKey(n); });
    el.addEventListener('pointerup',  e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    el.addEventListener('pointercancel',e=>{ el.releasePointerCapture(e.pointerId); el.classList.remove('pressed'); });
    kb.appendChild(el);
  });

  const pianoCase = kb.closest('.piano-case') || kb.parentElement.parentElement;
  const containerW = pianoCase.clientWidth - 26;
  const numWhite = wLocal.length;
  const dynWW = Math.max(WW, Math.floor(containerW / numWhite));
  const dynBW = Math.round(dynWW * 32/52);

  kb.querySelectorAll('.key.white').forEach(el=>{ el.style.width=dynWW+'px'; });
  kb.querySelectorAll('.key.black').forEach(el=>{
    const leftNote = Object.entries(blackAfter).find(([k])=>k===el.dataset.note)?.[1];
    if(!leftNote) return;
    const li = wIdxLocal[leftNote];
    if(li===undefined) return;
    el.style.left=(li*dynWW+dynWW-Math.round(dynBW/2)-2)+'px';
    el.style.width=dynBW+'px';
  });
  kb.style.width=(numWhite*dynWW)+'px';

  const keyArea = kb.parentElement;
  setTimeout(()=>{
    const kbW = numWhite*dynWW;
    const areaW = keyArea.getBoundingClientRect().width;
    keyArea.style.overflow = 'hidden';
    keyArea.style.overflowX = kbW > areaW+1 ? 'auto' : 'hidden';
    keyArea.style.paddingBottom = kbW > areaW+1 ? '4px' : '8px';
  },50);
}

buildKb('C4','C5');
initDiffSlider();

  if(document.getElementById('phase-quiz').style.display!=='none' && cfg.answerMode==='piano'){
